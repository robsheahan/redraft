<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/proofready/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/proofready/favicon.svg" />
  <link rel="shortcut icon" href="/proofready/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/proofready/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Proof Ready" />
  <link rel="manifest" href="/proofready/site.webmanifest" />
  <title>Forgot password — ProofReady</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #fdf6ee; color: #1f2937; line-height: 1.5; min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
    .nav { padding: 24px 32px; display: flex; align-items: center; justify-content: space-between; }
    .nav-brand { text-decoration: none; display: flex; align-items: center; }
    .nav-brand img { height: 40px; width: auto; }
    .nav-home { font-size: 14px; font-weight: 600; color: #4b5563; text-decoration: none; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.1); border-radius: 6px; padding: 8px 18px; }
    .nav-home:hover { background: rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.18); color: #1f2937; }
    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card { width: 100%; max-width: 400px; padding: 0 32px; }
    .card h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.6px; margin-bottom: 8px; text-align: center; }
    .card .sub { font-size: 15px; color: #6b7280; text-align: center; margin-bottom: 28px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #4b5563; }
    .form-group input { width: 100%; padding: 12px 16px; background: #fff; border: 1px solid rgba(0,0,0,0.1); border-radius: 10px; font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    .form-group input:focus { border-color: #ed7615; box-shadow: 0 0 0 3px rgba(237,118,21,0.1); }
    .submit-btn { width: 100%; padding: 14px; background: #ed7615; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s; box-shadow: 0 2px 8px rgba(237,118,21,0.4); }
    .submit-btn:hover { background: #d4690f; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg, .success-msg { border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
    .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
    .success-msg { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }
    .visible { display: block; }
    .back-link { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280; text-decoration: none; }
    .back-link:hover { color: #1f2937; }
    .site-footer { text-align: center; padding: 24px; font-size: 13px; color: #9ca3af; }
    .site-footer a { color: #9ca3af; text-decoration: none; margin: 0 10px; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand"><img src="/proofreadybanner.png" alt="ProofReady"></a>
    <a href="/auth.html" class="nav-home">Sign in</a>
  </nav>
  <div class="page">
    <div class="card">
      <h1>Forgot your password?</h1>
      <p class="sub">Enter your email and we'll send you a link to reset it.</p>

      <div class="error-msg" id="error"></div>
      <div class="success-msg" id="success"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <button class="submit-btn" id="submitBtn" onclick="submit()">Send reset link</button>
      <a href="/auth.html" class="back-link">← Back to sign in</a>
    </div>
  </div>
  <div class="site-footer">
    <a href="/contact.html">Contact</a>
    <a href="/privacy.html">Privacy Policy</a>
    <a href="/terms.html">Terms &amp; Conditions</a>
    <a href="/compliance.html">Compliance</a>
  </div>
  <script>
    function apiUrl(path) {
      var host = window.location.hostname;
      if (host === 'proofready.app' || host === 'www.proofready.app') return 'https://api.proofready.app' + path;
      return path;
    }
    async function submit() {
      var email = document.getElementById('email').value.trim();
      var errEl = document.getElementById('error');
      var okEl = document.getElementById('success');
      errEl.classList.remove('visible');
      okEl.classList.remove('visible');

      if (!email || !email.includes('@')) {
        errEl.textContent = 'Please enter a valid email address.';
        errEl.classList.add('visible');
        return;
      }

      var btn = document.getElementById('submitBtn');
      btn.textContent = 'Sending...';
      btn.disabled = true;

      try {
        var res = await fetch(apiUrl('/api/request-password-reset'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email }),
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Something went wrong.');

        okEl.textContent = 'If an account exists for that address, a reset link is on its way. Check your email (including spam).';
        okEl.classList.add('visible');
        btn.textContent = 'Link sent';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add('visible');
        btn.textContent = 'Send reset link';
        btn.disabled = false;
      }
    }

    document.addEventListener('keydown', function(e) { if (e.key === 'Enter') submit(); });
  </script>
</body>
</html>
