<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/proofready/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/proofready/favicon.svg" />
  <link rel="shortcut icon" href="/proofready/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/proofready/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Proof Ready" />
  <link rel="manifest" href="/proofready/site.webmanifest" />
  <title>Reset password — ProofReady</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #fdf6ee; color: #1f2937; line-height: 1.5; min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
    .nav { padding: 24px 32px; display: flex; align-items: center; }
    .nav-brand { text-decoration: none; display: flex; align-items: center; }
    .nav-brand img { height: 40px; width: auto; }
    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card { width: 100%; max-width: 400px; padding: 0 32px; }
    .card h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.6px; margin-bottom: 8px; text-align: center; }
    .card .sub { font-size: 15px; color: #6b7280; text-align: center; margin-bottom: 28px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #4b5563; }
    .form-group input { width: 100%; padding: 12px 16px; background: #fff; border: 1px solid rgba(0,0,0,0.1); border-radius: 10px; font-size: 15px; font-family: inherit; outline: none; }
    .form-group input:focus { border-color: #ed7615; box-shadow: 0 0 0 3px rgba(237,118,21,0.1); }
    .submit-btn { width: 100%; padding: 14px; background: #ed7615; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: 0 2px 8px rgba(237,118,21,0.4); }
    .submit-btn:hover { background: #d4690f; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg, .success-msg { border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
    .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
    .success-msg { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }
    .visible { display: block; }
    .site-footer { text-align: center; padding: 24px; font-size: 13px; color: #9ca3af; }
    .site-footer a { color: #9ca3af; text-decoration: none; margin: 0 10px; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand"><img src="/proofreadybanner.png" alt="ProofReady"></a>
  </nav>
  <div class="page">
    <div class="card" id="card">
      <h1>Choose a new password</h1>
      <p class="sub">Enter and confirm your new password below.</p>

      <div class="error-msg" id="error"></div>
      <div class="success-msg" id="success"></div>

      <div id="resetForm">
        <div class="form-group">
          <label>New password</label>
          <input type="password" id="pw1" placeholder="At least 6 characters" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>Confirm new password</label>
          <input type="password" id="pw2" placeholder="Type it again" autocomplete="new-password">
        </div>
        <button class="submit-btn" id="submitBtn" onclick="resetPassword()">Update password</button>
      </div>
    </div>
  </div>
  <div class="site-footer">
    <a href="/contact.html">Contact</a>
    <a href="/privacy.html">Privacy Policy</a>
    <a href="/terms.html">Terms &amp; Conditions</a>
    <a href="/compliance.html">Compliance</a>
    <a href="/admin.html" class="admin-only" style="display:none">Admin</a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/app.js"></script>
  <script>
    // A password-reset link lands here carrying a recovery credential. We
    // accept it in whatever form the provider sends:
    //   - implicit flow: tokens in the URL hash (#access_token=…&refresh_token=…)
    //   - already exchanged: detectSessionInUrl processed it before this ran,
    //     so a session already exists (PASSWORD_RECOVERY fired)
    //   - expired / already-used: the provider redirects back with an error
    //     (common when an email security scanner pre-clicks the one-time link)
    var recoverySessionReady = false;

    function enableForm() {
      recoverySessionReady = true;
      document.getElementById('error').classList.remove('visible');
      document.getElementById('submitBtn').disabled = false;
    }
    function linkError(msg) {
      showError(msg);
      document.getElementById('submitBtn').disabled = true;
    }

    sb.auth.onAuthStateChange(function(event, session) {
      if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)) enableForm();
    });

    async function initRecovery() {
      var hashParams = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
      var queryParams = new URLSearchParams(window.location.search || '');

      // Expired or already-used link — the link itself carried an error.
      var err = hashParams.get('error') || queryParams.get('error');
      if (err) {
        var desc = hashParams.get('error_description') || queryParams.get('error_description') || '';
        desc = decodeURIComponent(desc).replace(/\+/g, ' ');
        linkError('This reset link has expired or was already used' + (desc ? ' (' + desc + ')' : '') + '. Some email apps open links automatically, which uses them up — request a fresh link from the sign-in page and click it straight away.');
        return;
      }

      // Implicit flow — establish the session directly from the hash tokens.
      var access_token = hashParams.get('access_token');
      var refresh_token = hashParams.get('refresh_token');
      if (access_token && refresh_token) {
        var r1 = await sb.auth.setSession({ access_token: access_token, refresh_token: refresh_token });
        if (!r1.error) { enableForm(); return; }
      }

      // Maybe the client already exchanged it on load (detectSessionInUrl).
      var r2 = await sb.auth.getSession();
      if (r2.data && r2.data.session) { enableForm(); return; }

      // Give any in-flight auto-detection a brief moment, then give up.
      setTimeout(async function() {
        if (recoverySessionReady) return;
        var r3 = await sb.auth.getSession();
        if (r3.data && r3.data.session) { enableForm(); return; }
        linkError('This page only works when opened from a fresh password-reset email link. Go to the sign-in page, choose "Forgot your password?", and click the new link as soon as it arrives.');
      }, 1200);
    }

    document.getElementById('submitBtn').disabled = true;
    window.addEventListener('load', initRecovery);

    function showError(msg) {
      var el = document.getElementById('error');
      el.textContent = msg;
      el.classList.add('visible');
      document.getElementById('success').classList.remove('visible');
    }
    function showSuccess(msg) {
      var el = document.getElementById('success');
      el.textContent = msg;
      el.classList.add('visible');
      document.getElementById('error').classList.remove('visible');
    }

    async function resetPassword() {
      var pw1 = document.getElementById('pw1').value;
      var pw2 = document.getElementById('pw2').value;

      if (!pw1 || pw1.length < 6) { showError('Password must be at least 6 characters.'); return; }
      if (pw1 !== pw2) { showError("Those two passwords don't match."); return; }

      var btn = document.getElementById('submitBtn');
      btn.textContent = 'Updating...';
      btn.disabled = true;

      var result = await sb.auth.updateUser({ password: pw1 });
      if (result.error) {
        showError(result.error.message);
        btn.textContent = 'Update password';
        btn.disabled = false;
        return;
      }

      showSuccess('Password updated. Taking you to sign in...');
      await sb.auth.signOut();
      setTimeout(function() { window.location.href = '/auth.html'; }, 1500);
    }

    document.addEventListener('keydown', function(e) { if (e.key === 'Enter') resetPassword(); });
  </script>
</body>
</html>
