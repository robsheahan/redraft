<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProofReady — AI-powered feedback for students</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #111827; color: #fff; line-height: 1.5;
      min-height: 100vh; display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .nav {
      padding: 24px 32px; display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand {
      text-decoration: none; display: flex; align-items: center;
    }
    .nav-brand img { height: 32px; width: auto; }
    .nav-login {
      font-size: 14px; font-weight: 600; color: #d1d5db;
      text-decoration: none; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
      padding: 8px 18px; transition: all 0.15s;
    }
    .nav-login:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.2); color: #fff; }

    .hero {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px 80px; text-align: center;
    }
    .hero h1 {
      font-size: 56px; font-weight: 800; letter-spacing: -2.5px;
      line-height: 1.05; margin-bottom: 20px; max-width: 600px;
    }
    .hero h1 .accent { color: #f5a623; }
    .hero p {
      font-size: 17px; color: #9ca3af; max-width: 440px;
      line-height: 1.7; margin-bottom: 44px;
    }
    .hero-buttons { display: flex; gap: 12px; }
    .btn-blue {
      padding: 14px 32px; background: #ed7615; color: #fff;
      border-radius: 10px; font-size: 15px; font-weight: 700;
      text-decoration: none; transition: all 0.15s;
      box-shadow: 0 2px 8px rgba(237,118,21,0.4);
    }
    .btn-blue:hover { background: #d4690f; box-shadow: 0 4px 16px rgba(237,118,21,0.45); }
    .btn-ghost {
      padding: 14px 32px; background: transparent; color: #d1d5db;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
      font-size: 15px; font-weight: 700; text-decoration: none;
      transition: all 0.15s;
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.3); color: #fff; }

    @media (max-width: 600px) {
      .hero h1 { font-size: 38px; letter-spacing: -1.2px; }
      .hero-buttons { flex-direction: column; width: 100%; max-width: 280px; }
      .hero-buttons a { text-align: center; }
    }

    .footer { text-align: center; padding: 24px; font-size: 13px; color: #4b5563; }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-brand"><img src="/proofready-banner.svg" alt="ProofReady"></a>
    <a href="/auth.html" class="nav-login" id="navAction">Log in</a>
  </nav>

  <div class="hero">
    <h1>Smarter feedback, <span class="accent">better results</span></h1>
    <p>AI-powered, criteria-aligned feedback on assessment drafts — grounded in NESA syllabus standards.</p>
    <div class="hero-buttons">
      <a href="/auth.html" class="btn-blue" id="ctaPrimary">Get started</a>
      <a href="/auth.html" class="btn-ghost" id="ctaSecondary">Log in</a>
    </div>
  </div>

  <div class="footer">Formative feedback only — not a final mark.</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/app.js"></script>
  <script>
    getCurrentUser().then(user => {
      if (user) {
        const role = user.user_metadata?.role;
        if (role === 'teacher') window.location.href = '/teacher.html';
        else if (role === 'student') window.location.href = '/student.html';
        else window.location.href = '/choose-role.html';
      }
    });
  </script>

</body>
</html>
