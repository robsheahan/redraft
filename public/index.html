<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redraft — Get feedback on your draft</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #fafafa; color: #111827; line-height: 1.5;
      min-height: 100vh; display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .nav {
      padding: 24px 32px; display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand {
      font-size: 22px; font-weight: 800; text-decoration: none;
      color: #111827; letter-spacing: -0.5px;
    }
    .nav-brand .re { color: #2563eb; }
    .nav-login {
      font-size: 14px; font-weight: 600; color: #6b7280;
      text-decoration: none; transition: color 0.15s;
    }
    .nav-login:hover { color: #111827; }

    .hero {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px 80px; text-align: center;
    }
    .hero h1 {
      font-size: 52px; font-weight: 800; letter-spacing: -2px;
      line-height: 1.05; margin-bottom: 16px; max-width: 560px;
    }
    .hero p {
      font-size: 17px; color: #6b7280; max-width: 420px;
      line-height: 1.6; margin-bottom: 40px;
    }
    .hero-buttons { display: flex; gap: 12px; }
    .btn-dark {
      padding: 12px 28px; background: #111827; color: #fff;
      border-radius: 8px; font-size: 15px; font-weight: 700;
      text-decoration: none; transition: background 0.15s;
    }
    .btn-dark:hover { background: #1f2937; }
    .btn-outline {
      padding: 12px 28px; background: #fff; color: #111827;
      border: 1px solid #e5e7eb; border-radius: 8px;
      font-size: 15px; font-weight: 700; text-decoration: none;
      transition: border-color 0.15s;
    }
    .btn-outline:hover { border-color: #d1d5db; }

    @media (max-width: 600px) {
      .hero h1 { font-size: 36px; letter-spacing: -1px; }
      .hero-buttons { flex-direction: column; width: 100%; max-width: 280px; }
      .hero-buttons a { text-align: center; }
    }

    .footer { text-align: center; padding: 24px; font-size: 13px; color: #9ca3af; }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-brand"><span class="re">re</span>draft</a>
    <a href="/auth.html" class="nav-login" id="navAction">Log in</a>
  </nav>

  <div class="hero">
    <h1>Get feedback on your draft</h1>
    <p>Rubric-aligned feedback on your assessment drafts, powered by NESA syllabus standards.</p>
    <div class="hero-buttons">
      <a href="/auth.html" class="btn-dark" id="ctaPrimary">Get started</a>
      <a href="/auth.html" class="btn-outline" id="ctaSecondary">Log in</a>
    </div>
  </div>

  <div class="footer">Formative feedback only — not a final mark.</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/app.js"></script>
  <script>
    getCurrentUser().then(user => {
      if (user) {
        const role = user.user_metadata?.role;
        if (role === 'teacher') window.location.href = '/teacher.html';
        else if (role === 'student') window.location.href = '/student.html';
        else window.location.href = '/choose-role.html';
      }
    });
  </script>

</body>
</html>
