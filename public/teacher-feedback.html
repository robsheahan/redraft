<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Student feedback history — ProofReady</title>
  <link rel="icon" type="image/png" href="/proofready/favicon-96x96.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}body{margin:0;background:#faf7f2;color:#111827;font:14px/1.55 Inter,-apple-system,sans-serif}.nav{padding:16px 28px;border-bottom:1px solid #eee3d4;background:#fdf6ee}.nav img{height:38px}.wrap{max-width:960px;margin:0 auto;padding:34px 20px 70px}.back{color:#6b7280;text-decoration:none}.head{margin:18px 0 24px}.head h1{font-size:28px;margin:0 0 5px}.muted{color:#6b7280}.summary{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.chip{background:#fff;border:1px solid #e8e0d4;border-radius:999px;padding:5px 11px;font-weight:600}.draft{background:#fff;border:1px solid #e8e0d4;border-radius:13px;margin:14px 0;overflow:hidden}.draft summary{cursor:pointer;padding:17px 20px;font-weight:700;display:flex;justify-content:space-between;gap:12px}.draft[open] summary{border-bottom:1px solid #eee7dc}.body{padding:20px}.answer{white-space:pre-wrap;background:#faf8f5;border-radius:8px;padding:14px;margin:10px 0 20px}.section{margin:18px 0}.section h3{font-size:13px;text-transform:uppercase;letter-spacing:.35px;margin:0 0 7px;color:#374151}.section p{margin:5px 0}.section ul{margin:6px 0;padding-left:21px}.priority{border-left:3px solid #ed7615;padding-left:13px}.criterion,.question{border:1px solid #ece7df;border-radius:9px;padding:13px;margin:10px 0}.error{padding:16px;background:#fef2f2;color:#991b1b;border-radius:8px}
  </style>
</head>
<body><nav class="nav"><a href="/teacher.html"><img src="/proofreadybanner.png" alt="ProofReady"></a></nav><main class="wrap"><a id="back" class="back" href="teacher.html">← Back</a><div id="content">Loading…</div></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/js/app.js"></script>
<script>
const e=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function values(v){if(v==null)return[];if(Array.isArray(v))return v.filter(Boolean).map(String);if(typeof v==='string')return[v];if(typeof v==='object'){return values(v.summary).concat(values(v.detail));}return[String(v)];}
function listSection(title,val,cls){const xs=values(val);if(!xs.length)return'';return '<div class="section '+(cls||'')+'"><h3>'+e(title)+'</h3>'+(xs.length===1?'<p>'+e(xs[0])+'</p>':'<ul>'+xs.map(x=>'<li>'+e(x)+'</li>').join('')+'</ul>')+'</div>';}
function annotationText(x){if(!x)return'';const note=x.comment||x.suggestion||'';return x.quote?'“'+x.quote+'”'+(note?' — '+note:''):note;}
function criteriaHtml(items){return (items||[]).map(c=>'<div class="criterion"><strong>'+e(c.criterion||'Criterion')+'</strong><p>'+e(c.strengths||'')+'</p><p>'+e(c.improvements||'')+'</p></div>').join('');}
function feedbackHtml(fb){
  if(!fb)return '<div class="muted">No student-facing AI feedback was generated for this final submission.</div>';
  if(fb.kind==='multi_question')return (fb.questions||[]).map((q,i)=>'<div class="question"><strong>Question '+(i+1)+'</strong>'+(q.mc?'<p>'+(q.mc.correct?'Correct':'Not quite')+(q.mc.selected_option_text?' · '+e(q.mc.selected_option_text):'')+'</p>':'')+listSection("What they did well",q.what_youve_done_well)+listSection('Top priority',q.top_priority,'priority')+listSection('Things to improve',q.improvements)+listSection('Answering the question',q.task_verb_check)+criteriaHtml(q.criteria_feedback)+listSection('Inline feedback',(q.inline_suggestions||[]).map(annotationText))+listSection('What a strong response includes',q.what_a_strong_response_includes)+'</div>').join('');
  let h=listSection("What they did well",fb.what_youve_done_well)+listSection('Top priority',fb.top_priority,'priority')+listSection('Things to improve',fb.improvements)+listSection('Answering the question',fb.task_verb_check);
  h+=criteriaHtml(fb.criteria_feedback);
  h+=listSection('Step gaps',(fb.step_gaps||[]).map(x=>x.comment));
  h+=listSection('Inline feedback',(fb.inline_suggestions||fb.line_annotations||[]).map(annotationText));
  h+=listSection('Overall',fb.overall)+listSection('What a strong response includes',fb.what_a_strong_response_includes)+listSection('Self-check',fb.self_check);
  return h||'<div class="muted">Feedback was saved, but it has no displayable sections.</div>';
}
function answerHtml(d){if(Array.isArray(d.answers)&&d.answers.length)return d.answers.map((a,i)=>'<div class="question"><strong>Question '+(i+1)+'</strong><div class="answer">'+e(a.text||a.selected_option_text||'No answer')+'</div></div>').join('');if(Array.isArray(d.working_lines))return '<div class="answer">'+d.working_lines.map((x,i)=>(i+1)+'. '+e(x.math||'')).join('<br>')+'</div>';return '<div class="answer">'+e(d.draft_text||'No response text')+'</div>';}
(async()=>{const user=await requireAuth('teacher');if(!user)return;const p=new URLSearchParams(location.search),taskId=p.get('task_id'),studentId=p.get('student_id'),out=document.getElementById('content');if(!taskId||!studentId){out.innerHTML='<div class="error">Missing task or student.</div>';return;}document.getElementById('back').href='task-detail.html?id='+encodeURIComponent(taskId);try{const r=await authFetch('/api/task-submissions?task_id='+encodeURIComponent(taskId)+'&student_id='+encodeURIComponent(studentId));const data=await r.json();if(!r.ok)throw new Error(data.error||'Could not load history');const ds=(data.submissions||[]).slice().sort((a,b)=>(a.draft_version||0)-(b.draft_version||0));const name=ds[0]?.student_name||'Student',feedbackCount=ds.filter(d=>!d.submitted_for_marking&&d.feedback).length;out.innerHTML='<div class="head"><h1>'+e(name)+'</h1><div class="muted">'+e(data.task.title||'Task')+'</div><div class="summary"><span class="chip">'+feedbackCount+' feedback draft'+(feedbackCount===1?'':'s')+'</span><span class="chip">'+(ds.some(d=>d.submitted_for_marking)?'Submitted for marking':'Not yet submitted')+'</span></div></div>'+ds.map((d,i)=>{const final=d.submitted_for_marking;const label=final?(d.graded_at?'Marked submission':'Final submission'):('Draft '+e(d.draft_version||i+1));const date=new Date(d.created_at).toLocaleString('en-AU');return '<details class="draft" '+(i===ds.length-1?'open':'')+'><summary><span>'+label+'</span><span class="muted">'+e(date)+'</span></summary><div class="body"><h3>Student response</h3>'+answerHtml(d)+'<h2 style="font-size:18px">Feedback the student received</h2>'+feedbackHtml(d.feedback)+'</div></details>';}).join('');}catch(err){out.innerHTML='<div class="error">'+e(err.message)+'</div>';}})();
</script></body></html>
