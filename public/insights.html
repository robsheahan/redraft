    let availableFaculties = [];
    let staffCache = [];

    async function loadMembers() {
      const target = document.getElementById('membersTable');
      if (!target || !currentData) return;
      try {
        const res = await authFetch('/api/school-members?school_id=' + encodeURIComponent(currentData.school.id));
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Could not load staff.');
        availableFaculties = data.faculties || [];
        staffCache = data.members || [];
        target.innerHTML = renderStaffList(staffCache);
        target.querySelectorAll('tr.clickable').forEach(tr => {
          tr.addEventListener('click', () => openAccessModal(tr.dataset.userId));
        });
      } catch (err) {
        target.innerHTML = '<div class="detail-empty">' + e(err.message) + '</div>';
      }
    }

    function renderStaffList(staff) {
      if (staff.length === 0) {
        return '<div class="detail-empty">No school staff registered yet. Once teachers sign up with a matching school email domain, they will appear here.</div>';
      }
      let html = '<table class="access-table"><thead><tr><th>Name</th><th>Email</th><th>Access</th></tr></thead><tbody>';
      staff.forEach(s => {
        html += '<tr class="clickable" data-user-id="' + e(s.user_id) + '">';
        html += '<td>' + e(s.name) + '</td>';
        html += '<td class="detail-mono">' + e(s.email) + '</td>';
        html += '<td>' + renderGrantSummary(s) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      return html;
    }

    function renderGrantSummary(s) {
      if (s.role === 'admin') {
        return '<span class="detail-role-pill admin">Admin — full access</span>';
      }
      if (s.role === 'leader') {
        if (!s.faculties || s.faculties.length === 0) {
          return '<span class="detail-role-pill leader">Leader — all faculties</span>';
        }
        return '<span class="detail-role-pill leader">Leader</span> '
          + s.faculties.map(f => '<span class="access-faculty-chip">' + e(f) + '</span>').join('');
      }
      return '<span class="access-grant-summary none">No access</span>';
    }

    let modalTargetUserId = null;

    function openAccessModal(userId) {
      const s = staffCache.find(x => x.user_id === userId);
      if (!s) return;
      modalTargetUserId = userId;

      document.getElementById('modalTitle').textContent = 'Set access for ' + s.name;
      document.getElementById('modalTarget').innerHTML =
        '<div class="name">' + e(s.name) + '</div><div class="email">' + e(s.email) + '</div>';

      // Role radios
      const currentRole = s.role || 'none';
      document.querySelectorAll('input[name="modalRole"]').forEach(r => {
        r.checked = (r.value === currentRole);
      });
      syncRoleHighlight();

      // Faculty checkboxes
      const grid = document.getElementById('modalFacGrid');
      grid.innerHTML = availableFaculties.map(f =>
        '<label class="modal-faculty"><input type="checkbox" value="' + e(f) + '"> ' + e(f) + '</label>'
      ).join('');
      const facCheckboxes = grid.querySelectorAll('input[type="checkbox"]');
      const selected = new Set(s.faculties || []);
      facCheckboxes.forEach(cb => { cb.checked = selected.has(cb.value); });
      facCheckboxes.forEach(cb => cb.addEventListener('change', () => {
        cb.closest('.modal-faculty').classList.toggle('is-checked', cb.checked);
        document.getElementById('modalFacAll').checked = false;
        syncFacToggle();
      }));
      grid.querySelectorAll('.modal-faculty').forEach(el => {
        el.classList.toggle('is-checked', el.querySelector('input').checked);
      });
      // "All faculties" toggle
      const allCb = document.getElementById('modalFacAll');
      allCb.checked = (currentRole === 'leader' && selected.size === 0);
      allCb.onchange = () => {
        if (allCb.checked) {
          facCheckboxes.forEach(cb => { cb.checked = false; cb.closest('.modal-faculty').classList.remove('is-checked'); });
        }
      };
      syncFacToggle();

      // Wire role radios to re-sync UI
      document.querySelectorAll('input[name="modalRole"]').forEach(r => r.onchange = () => {
        syncRoleHighlight();
        syncFacToggle();
      });

      // Remove button visibility
      const removeBtn = document.getElementById('modalRemove');
      removeBtn.style.display = s.role ? '' : 'none';
      removeBtn.onclick = handleRemove;

      // Save button
      document.getElementById('modalSave').onclick = handleSave;

      document.getElementById('accessModal').classList.add('visible');
    }

    function closeAccessModal() {
      document.getElementById('accessModal').classList.remove('visible');
      modalTargetUserId = null;
    }

    function syncRoleHighlight() {
      document.querySelectorAll('.modal-radio').forEach(r => {
        const input = r.querySelector('input');
        r.classList.toggle('is-active', input.checked);
      });
    }

    function syncFacToggle() {
      const role = document.querySelector('input[name="modalRole"]:checked')?.value || 'none';
      const facGroup = document.getElementById('modalFacultiesGroup');
      // Faculties only apply to leader. Hide for admin/none.
      facGroup.style.display = role === 'leader' ? '' : 'none';
    }

    async function handleSave() {
      const role = document.querySelector('input[name="modalRole"]:checked')?.value;
      if (!role) return;
      const btn = document.getElementById('modalSave');
      btn.disabled = true; btn.textContent = 'Saving...';
      try {
        if (role === 'none') {
          // Remove the grant entirely
          const res = await authFetch('/api/school-members?school_id=' + encodeURIComponent(currentData.school.id) + '&user_id=' + encodeURIComponent(modalTargetUserId), { method: 'DELETE' });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed to update.');
        } else {
          let faculties = [];
          if (role === 'leader') {
            const allCb = document.getElementById('modalFacAll');
            if (!allCb.checked) {
              faculties = Array.from(document.querySelectorAll('#modalFacGrid input[type="checkbox"]:checked')).map(cb => cb.value);
              if (faculties.length === 0) {
                btn.disabled = false; btn.textContent = 'Save';
                alert('Pick at least one faculty, or check "All faculties" to grant unrestricted access.');
                return;
              }
            }
          }
          const res = await authFetch('/api/school-members', {
            method: 'PUT',
            body: JSON.stringify({ school_id: currentData.school.id, user_id: modalTargetUserId, role, faculties }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed to update.');
        }
        closeAccessModal();
        await loadMembers();
      } catch (err) {
        alert(err.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Save';
      }
    }

    async function handleRemove() {
      const s = staffCache.find(x => x.user_id === modalTargetUserId);
      if (!s) return;
      if (!confirm('Remove ' + s.name + '\'s access to the insights dashboard?')) return;
      try {
        const res = await authFetch('/api/school-members?school_id=' + encodeURIComponent(currentData.school.id) + '&user_id=' + encodeURIComponent(modalTargetUserId), { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to remove.');
        closeAccessModal();
        await loadMembers();
      } catch (err) {
        alert(err.message);
      }
    }

    function renderInsights(ins) {
      if (!ins) return '';
      let html = '';

      if (ins.restricted_view) {
        const fac = (ins.viewer_faculties || []).map(f => '<strong>' + e(f) + '</strong>').join(', ');
        html += '<div class="section" style="border-left:3px solid #ed7615">'
          + '<div class="section-title" style="color:#b45309;letter-spacing:0.5px">FACULTY-RESTRICTED VIEW</div>'
          + '<p class="section-text" style="font-size:14px">You can see insights for ' + fac + ' only. School-wide aggregates are hidden — ask your school admin if you need broader access.</p>'
          + '</div>';
        if (!ins.by_faculty || ins.by_faculty.length === 0) {
          html += '<div class="section"><p class="section-text" style="color:#9ca3af">No tasks with class-level feedback exist yet in the faculties you have access to.</p></div>';
        }
      }

      if (ins.school_snapshot) {
        html += '<div class="section snapshot"><div class="section-title"><span class="section-dot"></span>School snapshot</div>';
        html += '<p class="section-text">' + e(ins.school_snapshot) + '</p></div>';
      }
      if (ins.school_strengths && ins.school_strengths.length) {
        html += '<div class="section strengths"><div class="section-title"><span class="section-dot"></span>What\'s working across the school</div>';
        html += '<ul class="feedback-list">';
        ins.school_strengths.forEach(p => { html += '<li>' + e(p) + '</li>'; });
        html += '</ul></div>';
      }
      if (ins.school_weaknesses && ins.school_weaknesses.length) {
        html += '<div class="section weaknesses"><div class="section-title"><span class="section-dot"></span>Common gaps across the school</div>';
        html += '<ul class="feedback-list">';
        ins.school_weaknesses.forEach(p => { html += '<li>' + e(p) + '</li>'; });
        html += '</ul></div>';
      }
      if (ins.verb_depth_patterns) {
        html += '<div class="section verb-adherence"><div class="section-title"><span class="section-dot"></span>Syllabus verb-depth patterns</div>';
        html += '<p class="section-text">' + e(ins.verb_depth_patterns) + '</p></div>';
      }
      if (ins.by_faculty && ins.by_faculty.length) {
        html += '<div class="section"><div class="section-title" style="color:#374151"><span class="section-dot" style="background:#ed7615"></span>By faculty</div>';
        html += '<div class="faculty-grid">';
        ins.by_faculty.forEach(f => {
          html += '<div class="faculty-card">';
          html += '<h4>' + e(f.faculty || 'Unknown') + '<span class="task-count">' + (f.task_count || 0) + ' task' + (f.task_count === 1 ? '' : 's') + '</span></h4>';
          if (f.notable_pattern) html += '<div class="notable">' + e(f.notable_pattern) + '</div>';
          if (f.strengths && f.strengths.length) {
            html += '<div class="faculty-subhead">Strengths</div><ul>';
            f.strengths.forEach(s => { html += '<li>' + e(s) + '</li>'; });
            html += '</ul>';
          }
          if (f.weaknesses && f.weaknesses.length) {
            html += '<div class="faculty-subhead">Gaps</div><ul>';
            f.weaknesses.forEach(w => { html += '<li>' + e(w) + '</li>'; });
            html += '</ul>';
          }
          html += '</div>';
        });
        html += '</div></div>';
      }
      return html;
    }

    // ─────────────── Single "Generate Insights" orchestration ───────────────

    // Spinner overlay for a card whose id is mid-generation. Sits on top of the
    // card's existing content (which stays visible underneath) until the new
    // result replaces it.
    function genOverlay(id) {
      if (!generatingKinds.has(id)) return '';
      return '<div class="gen-overlay"><div class="spinner"></div><div class="gen-msg">Generating insights…</div></div>';
    }

    // True when any insight on the current view has already been generated —
    // drives the button label (Generate vs Regenerate).
    function hasAnyInsights() {
      const isStudentMode = !!(activeFilters.student_id && currentStudent);
      if (isStudentMode) {
        const llm = (currentStudent.cards && currentStudent.cards.llm) || {};
        return ['student_summary', 'student_top_mistakes', 'student_stretch_goals', 'student_strengths']
          .some(k => llm[k] && llm[k].content);
      }
      const llm = (currentCards && currentCards.cards && currentCards.cards.llm) || {};
      const anyCard = ['bottom_decile', 'top_decile', 'common_gaps', 'things_done_well']
        .some(k => llm[k] && llm[k].content);
      return anyCard || !!(currentData && currentData.insights) || !!currentClassBaseline;
    }

    // The page-level button. Hidden in the student view when the student is
    // below the LLM floor (nothing can be generated there).
    function renderInsightsActionBar() {
      const isStudentMode = !!(activeFilters.student_id && currentStudent);
      if (isStudentMode) {
        const eligible = currentStudent.cards && currentStudent.cards.llm_eligible !== false;
        if (!eligible) return '';
      }
      const label = generatingInsights
        ? 'Generating insights…'
        : (hasAnyInsights() ? 'Regenerate Insights' : 'Generate Insights');
      return '<div class="insights-action-bar">'
        + '<button class="btn-generate-insights" id="generateInsightsBtn"' + (generatingInsights ? ' disabled' : '') + '>'
        + (generatingInsights ? '<span class="btn-spinner" aria-hidden="true"></span>' : '')
        + e(label) + '</button>'
        + '</div>';
    }

    function finishInsightKind(id) {
      generatingKinds.delete(id);
      render();
    }

    // Generate every applicable insight for the current view in parallel. Each
    // card shows a spinner while it runs and swaps to fresh content the moment
    // its own call returns; prior content stays put until then.
    async function generateAllInsights() {
      if (generatingInsights) return;
      const isStudentMode = !!(activeFilters.student_id && currentStudent);
      const role = (currentCards && currentCards.caller_role) || (currentStudent && currentStudent.caller_role) || 'teacher';

      const tasks = [];
      if (isStudentMode) {
        const eligible = currentStudent.cards && currentStudent.cards.llm_eligible !== false;
        if (!eligible) return;
        ['student_summary', 'student_top_mistakes', 'student_stretch_goals', 'student_strengths']
          .forEach(kind => tasks.push({ type: 'card', kind, id: kind }));
      } else {
        // common_gaps now generates the gaps AND the strengths (things_done_well)
        // in one consistent call, so it isn't requested as a separate kind.
        const kinds = role === 'teacher'
          ? ['common_gaps', 'top_decile']
          : ['bottom_decile', 'top_decile', 'common_gaps'];
        kinds.forEach(kind => tasks.push({ type: 'card', kind, id: kind }));
        if (activeFilters.class_id) tasks.push({ type: 'baseline', kind: 'class_profile_summary', id: 'class_profile_summary' });
        if (role !== 'teacher') {
          const tasksWithFb = (currentCards && currentCards.counts && currentCards.counts.tasks_with_class_feedback) || 0;
          if (tasksWithFb > 0) tasks.push({ type: 'synthesis', id: 'synthesis' });
        }
      }
      if (tasks.length === 0) return;

      generatingInsights = true;
      generatingKinds = new Set(tasks.map(t => t.id));
      // common_gaps fills the strengths card from the same call — spin both.
      if (generatingKinds.has('common_gaps')) generatingKinds.add('things_done_well');
      render();

      const results = await Promise.all(tasks.map(runOneInsight));

      generatingInsights = false;
      generatingKinds = new Set();
      render();

      // Floor/empty-data responses (e.g. "needs at least 10 submissions") are
      // expected states, not errors — those cards just stay empty. Only alert
      // on genuine failures.
      const hard = results.filter(r => r.error && !/enough|at least|needs|submission/i.test(r.error));
      if (hard.length) {
        alert(hard.length + ' insight' + (hard.length === 1 ? '' : 's') + ' could not be generated:\n\n'
          + hard.map(h => '• ' + h.id + ': ' + h.error).join('\n'));
      }
    }

    async function runOneInsight(task) {
      const isStudentMode = !!(activeFilters.student_id && currentStudent);
      try {
        if (task.type === 'synthesis') {
          const body = SCHOOL_ID_OVERRIDE ? { school_id: SCHOOL_ID_OVERRIDE } : {};
          const res = await authFetch('/api/insights-synthesis', { method: 'POST', body: JSON.stringify(body) });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || 'Failed to generate synthesis');
          currentData = data;
        } else {
          const filterBody = { kind: task.kind, school_id: SCHOOL_ID_OVERRIDE || undefined };
          if (task.type === 'baseline') {
            filterBody.class_id = activeFilters.class_id;
          } else {
            FILTER_KEYS.forEach(k => { if (activeFilters[k]) filterBody[k] = activeFilters[k]; });
          }
          const res = await authFetch('/api/insights-card-generate', { method: 'POST', body: JSON.stringify(filterBody) });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || ('Failed to generate ' + task.kind));
          if (task.type === 'baseline') {
            currentClassBaseline = data;
          } else if (isStudentMode && currentStudent) {
            currentStudent.cards = currentStudent.cards || {};
            currentStudent.cards.llm = currentStudent.cards.llm || {};
            currentStudent.cards.llm[task.kind] = {
              content: data.content,
              generated_at: data.generated_at,
              source_submission_count: data.source_submission_count,
            };
          } else if (currentCards && currentCards.cards) {
            currentCards.cards.llm = currentCards.cards.llm || {};
            currentCards.cards.llm[task.kind] = {
              content: data.content,
              generated_at: data.generated_at,
              source_submission_count: data.source_submission_count,
              filters: data.filters,
            };
            // common_gaps returns the strengths too — populate the
            // things_done_well card from the same consistent call.
            if (task.kind === 'common_gaps' && data.content && Array.isArray(data.content.strengths)) {
              currentCards.cards.llm['things_done_well'] = {
                content: { strengths: data.content.strengths },
                generated_at: data.generated_at,
                source_submission_count: data.source_submission_count,
                filters: data.filters,
              };
              finishInsightKind('things_done_well');
            }
          }
        }
        finishInsightKind(task.id);
        return { id: task.id, error: null };
      } catch (err) {
        finishInsightKind(task.id);
        if (task.kind === 'common_gaps') finishInsightKind('things_done_well');
        return { id: task.id, error: (err && err.message) || String(err) };
      }
    }

    // ─────────────── LLM card renderers ───────────────

    function renderLLMCard(kind, cache, opts) {
      const hasContent = !!(cache && cache.content);
      const lastGen = cache && cache.generated_at
        ? new Date(cache.generated_at).toLocaleString('en-AU', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
        : null;

      let html = genOverlay(kind);
      html += '<div class="synthesis-head">';
      html += '<div><h3 style="font-size:14.5px">' + e(opts.title) + '</h3>';
      html += '<div class="meta" style="font-size:11.5px;color:#9ca3af;margin-top:2px">' + e(opts.sub) + '</div>';
      if (hasContent) {
        const ctx = [];
        if (cache.source_submission_count) ctx.push(cache.source_submission_count + ' submission' + (cache.source_submission_count === 1 ? '' : 's'));
        if (lastGen) ctx.push('updated ' + lastGen);
        const filtersStr = formatFilterContext(cache.filters);
        if (filtersStr) ctx.push('scope: ' + filtersStr);
        html += '<div class="meta" style="margin-top:4px">' + e(ctx.join(' · ')) + '</div>';
      }
      html += '</div>';
      html += '</div>';

      html += '<div id="llmBody_' + e(kind) + '" style="font-size:13.5px;color:#374151;line-height:1.55">';
      if (hasContent) {
        html += opts.render(cache.content);
      } else {
        html += '<div class="card-empty" style="padding:20px"><strong>Not generated yet</strong>' + e(opts.emptyTeaser) + '</div>';
      }
      html += '</div>';
      return html;
    }

    function formatFilterContext(f) {
      if (!f) return '';
      const parts = [];
      if (f.year_level) parts.push('Year ' + f.year_level);
      if (f.faculty) parts.push(f.faculty);
      if (f.course) parts.push(f.course);
      if (f.class_id) parts.push('class');
      const tw = (f.time_window) || DEFAULT_TIME_WINDOW;
      const twOpt = TIME_WINDOW_OPTIONS.find(o => o.value === tw);
      if (twOpt) parts.push(twOpt.label);
      return parts.join(' · ');
    }

    function renderBottomDecile(c) {
      let html = '<ul class="pts">';
      (c.patterns || []).forEach(p => {
        html += '<li><div><div class="pt-head">' + e(p.headline) + '</div>'
          + '<div class="pt-detail">' + e(p.detail) + '</div>'
          + (p.prevalence_note ? '<div class="pt-meta">' + e(p.prevalence_note) + '</div>' : '')
          + '</div></li>';
      });
      html += '</ul>';
      return html;
    }

    function renderTopDecile(c) {
      let html = '<ul class="pts">';
      (c.next_steps || []).forEach(p => {
        html += '<li><div><div class="pt-head">' + e(p.headline) + '</div>'
          + '<div class="pt-detail">' + e(p.detail) + '</div></div></li>';
      });
      html += '</ul>';
      return html;
    }

    function renderListedItems(c) {
      const items = c.gaps || c.strengths || [];
      let html = '<ul class="pts">';
      items.forEach(p => {
        html += '<li><div><div class="pt-head">' + e(p.headline) + '</div>'
          + '<div class="pt-detail">' + e(p.detail) + '</div>'
          + (p.faculties_involved && p.faculties_involved.length
              ? '<div class="pt-meta">' + e(p.faculties_involved.join(' · ')) + '</div>'
              : '')
          + '</div></li>';
      });
      html += '</ul>';
      return html;
    }

    // ── Longitudinal cohort baseline (stage D card) ─────────────────────
    // Renders the "Class baseline" panel at the top of the cohort grid when
    // a class_id filter is active. The panel shows aggregated patterns drawn
    // from each enrolled student's longitudinal profile — useful before any
    // tasks have been set this term.
    function renderClassBaselinePanel() {
      if (!activeFilters.class_id) return '';
      let html = '<div class="baseline-panel">';
      html += genOverlay('class_profile_summary');
      html += '<div class="head">';
      html += '<div>';
      html += '<h3>Class overview</h3>';
      html += '<div class="sub">Class strengths and weaknesses, drawn from each enrolled student\'s ProofReady history.</div>';
      html += '</div>';
      html += '</div>';

      if (currentClassBaseline) {
        const c = currentClassBaseline.content || {};
        const b = currentClassBaseline.cohort_breakdown || {};
        if (c.aggregate_narrative) {
          html += '<div class="narrative">' + e(c.aggregate_narrative) + '</div>';
        }
        html += '<div class="baseline-breakdown">';
        html += '<div class="item"><div class="num">' + (b.total_students || 0) + '</div><div class="lbl">Students enrolled</div></div>';
        html += '<div class="item"><div class="num">' + (b.established_count || 0) + '</div><div class="lbl">Established profiles</div></div>';
        html += '<div class="item"><div class="num">' + (b.developing_count || 0) + '</div><div class="lbl">Developing</div></div>';
        html += '<div class="item"><div class="num">' + ((b.new_count || 0) + (b.missing_profiles || 0)) + '</div><div class="lbl">New to ProofReady</div></div>';
        html += '</div>';
        const strengths = c.top_strengths || [];
        const priorities = c.top_priorities || [];
        if (strengths.length || priorities.length) {
          html += '<div class="baseline-twoup">';
          html += '<div class="col"><h5>Top strengths coming in</h5><ul>';
          strengths.forEach(s => { html += '<li>' + e(s) + '</li>'; });
          if (!strengths.length) html += '<li style="opacity:0.6">No recurring strengths yet — too few established profiles.</li>';
          html += '</ul></div>';
          html += '<div class="col"><h5>Top priorities to target</h5><ul>';
          priorities.forEach(p => { html += '<li>' + e(p) + '</li>'; });
          if (!priorities.length) html += '<li style="opacity:0.6">No recurring priorities yet — too few established profiles.</li>';
          html += '</ul></div>';
          html += '</div>';
        }
      } else {
        html += '<div class="baseline-empty">Use <strong>Generate Insights</strong> above to synthesise an overview of this class from each student\'s ProofReady history. Useful at the start of a term, or as a comparison against the current-term picture below.</div>';
      }
      html += '</div>';
      return html;
    }

    // ── Longitudinal student profile (stage C panel) ────────────────────
    // Cross-teacher, cross-year synthesis of one student. Auto-loaded on
    // student selection; the API is cache-first so it's usually instant.
    function renderStudentProfilePanel() {
      if (studentProfileLoading) {
        return '<div class="student-profile-panel">'
          + '<div class="ribbon">Longitudinal profile</div>'
          + '<div class="loading">Loading their ProofReady history…</div>'
          + '</div>';
      }
      if (!currentStudentProfile) return '';
      const p = currentStudentProfile;
      const status = p.profile_status || 'new';
      const statusLabel = status === 'established' ? 'Established profile'
        : status === 'developing' ? 'Developing profile'
        : 'New to ProofReady';

      let html = '<div class="student-profile-panel">';
      html += '<div class="ribbon">Longitudinal profile <span class="status-pill ' + e(status) + '">' + e(statusLabel) + '</span></div>';
      if (p.narrative) html += '<div class="narrative">' + e(p.narrative) + '</div>';
      if (p.headline_strength || p.headline_priority) {
        html += '<div class="twocol">';
        html += '<div><div class="key">Most consistent strength</div><div class="val">' + e(p.headline_strength || '—') + '</div></div>';
        html += '<div><div class="key">Most useful next step</div><div class="val">' + e(p.headline_priority || '—') + '</div></div>';
        html += '</div>';
      }
      if (p.profile_status_note && status !== 'established') {
        html += '<div style="margin-top:12px;font-size:12px;color:#6b7280;font-style:italic">' + e(p.profile_status_note) + '</div>';
      }
      html += '</div>';
      return html;
    }

    async function fetchStudentProfile(studentId, requestToken) {
      try {
        const qs = '?student_id=' + encodeURIComponent(studentId)
          + (SCHOOL_ID_OVERRIDE ? '&school_id=' + encodeURIComponent(SCHOOL_ID_OVERRIDE) : '');
        const res = await authFetch('/api/student-profile' + qs);
        if (requestToken !== reloadToken) return;
        studentProfileLoading = false;
        if (!res.ok) {
          currentStudentProfile = null;
          render();
          return;
        }
        const data = await res.json();
        currentStudentProfile = data.profile || null;
        if (currentStudentProfile) currentStudentProfile._student_id = studentId;
        render();
      } catch (err) {
        studentProfileLoading = false;
        currentStudentProfile = null;
        render();
      }
    }

    // ── Cohort skill matrix (R1) — deterministic, from student_skill_profile ──
    const SKILL_LEVEL_ORDER = ['emerging', 'developing', 'consolidating', 'secure', 'extending'];
    const SKILL_LEVEL_COLORS = {
      emerging: '#d9694f', developing: '#e0a24a', consolidating: '#cabb52',
      secure: '#6aa98f', extending: '#3f8f6b',
    };
    const SKILL_LEVEL_LABEL = {
      emerging: 'Emerging', developing: 'Developing', consolidating: 'Consolidating',
      secure: 'Secure', extending: 'Extending',
    };

    function skillTrendBadge(dim) {
      const net = dim.net_trend || 0;
      if (dim.trend && dim.trend.improving === 0 && dim.trend.regressing === 0) {
        return '<span style="color:#9ca3af;font-size:11.5px">→ steady</span>';
      }
      if (net > 0) return '<span title="' + e(dim.trend.improving + ' improving, ' + dim.trend.regressing + ' slipping') + '" style="color:#3f8f6b;font-size:11.5px;font-weight:600">▲ ' + net + ' net improving</span>';
      if (net < 0) return '<span title="' + e(dim.trend.improving + ' improving, ' + dim.trend.regressing + ' slipping') + '" style="color:#d9694f;font-size:11.5px;font-weight:600">▼ ' + (-net) + ' net slipping</span>';
      return '<span style="color:#9ca3af;font-size:11.5px">→ steady</span>';
    }

    function renderSkillMatrixFamily(fam, familyLabel) {
      let html = '<div style="margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:6px">'
        + '<strong style="font-size:13.5px">' + e(familyLabel) + '</strong>'
        + '<span style="font-size:11.5px;color:#9ca3af">' + fam.student_count + ' student' + (fam.student_count === 1 ? '' : 's') + ' with data · developmental levels, not marks</span>'
        + '</div>';

      // Spine rollup — the 4-capability whole-student view, lowest first.
      if (fam.spine_rollup && fam.spine_rollup.length) {
        html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin:0 0 12px">';
        fam.spine_rollup.forEach(s => {
          const col = SKILL_LEVEL_COLORS[s.mean_label] || '#9ca3af';
          html += '<span title="' + e(s.blurb) + '" style="display:inline-flex;align-items:center;gap:6px;font-size:11.5px;background:#faf8f4;border:1px solid #ece7de;border-radius:100px;padding:3px 10px">'
            + '<span style="width:8px;height:8px;border-radius:50%;background:' + col + '"></span>'
            + '<strong>' + e(s.label) + '</strong> <span style="color:#6b7280">' + e(SKILL_LEVEL_LABEL[s.mean_label] || s.mean_label) + '</span>'
            + '</span>';
        });
        html += '</div>';
      }

      // Per-dimension distribution rows.
      fam.dimensions.forEach(dim => {
        const total = dim.observed_students || 0;
        const isFocus = fam.focus_dimension === dim.key;
        html += '<div style="margin:0 0 13px;padding-left:10px;border-left:3px solid ' + (isFocus ? '#ed7615' : 'transparent') + '">';
        html += '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px">'
          + '<div style="font-size:13px"><strong>' + e(dim.key) + ' · ' + e(dim.label) + '</strong>'
          + (isFocus ? ' <span style="font-size:10px;font-weight:700;color:#ed7615;border:1px solid #ed7615;border-radius:4px;padding:0 5px;vertical-align:middle;letter-spacing:0.3px">FOCUS</span>' : '')
          + '</div>'
          + '<div style="text-align:right;white-space:nowrap">median <strong>' + e(SKILL_LEVEL_LABEL[dim.median_label] || dim.median_label) + '</strong> &nbsp; ' + skillTrendBadge(dim) + '</div>'
          + '</div>';

        if (total === 0) {
          html += '<div style="height:16px;border-radius:4px;background:#f3f0ea;color:#b8b0a2;font-size:10.5px;display:flex;align-items:center;justify-content:center">no data for this skill yet</div>';
        } else {
          html += '<div style="display:flex;height:16px;border-radius:4px;overflow:hidden;background:#f3f0ea">';
          SKILL_LEVEL_ORDER.forEach(lv => {
            const c = dim.distribution[lv] || 0;
            if (!c) return;
            const w = (c / total) * 100;
            html += '<div title="' + e(SKILL_LEVEL_LABEL[lv] + ': ' + c + ' student' + (c === 1 ? '' : 's')) + '" style="width:' + w.toFixed(1) + '%;background:' + SKILL_LEVEL_COLORS[lv] + '"></div>';
          });
          html += '</div>';
          let meta = total + ' student' + (total === 1 ? '' : 's') + ' · avg confidence ' + Math.round((dim.avg_confidence || 0) * 100) + '%';
          if (dim.low_confidence_students > 0) meta += ' · ' + dim.low_confidence_students + ' on thin evidence';
          html += '<div style="font-size:11px;color:#9ca3af;margin-top:3px">' + e(meta) + '</div>';
        }
        html += '</div>';
      });
      return html;
    }

    function renderSkillMatrix(m) {
      if (!m || (!m.writing && !m.maths)) {
        return '<div class="card-empty"><strong>No skill data yet</strong>Once students submit drafts and get feedback, each submission is scored against the ProofReady skill dimensions and the cohort\'s distribution appears here — free, instant, and updated on every load.</div>';
      }
      // Legend.
      let html = '<div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px;font-size:11px;color:#6b7280">';
      SKILL_LEVEL_ORDER.forEach(lv => {
        html += '<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:' + SKILL_LEVEL_COLORS[lv] + '"></span>' + e(SKILL_LEVEL_LABEL[lv]) + '</span>';
      });
      html += '</div>';
      if (m.writing) html += renderSkillMatrixFamily(m.writing, 'Writing skills');
      if (m.writing && m.maths) html += '<div style="height:1px;background:#ece7de;margin:16px 0"></div>';
      if (m.maths) html += renderSkillMatrixFamily(m.maths, 'Maths skills');
      return html;
    }

    // ── Cohort skill growth (R2) — within-student deltas from skill_observations ──
    function skillGrowthSpanLabel(fromISO, toISO) {
      if (!fromISO || !toISO) return '';
      const days = Math.max(0, Math.round((new Date(toISO) - new Date(fromISO)) / 86400000));
      if (days < 14) return 'over the last ' + Math.max(1, days) + ' day' + (days === 1 ? '' : 's');
      if (days < 70) return 'over the last ' + Math.round(days / 7) + ' weeks';
      return 'over the last ' + Math.round(days / 30) + ' months';
    }

    function renderSkillGrowthFamily(fam, familyLabel) {
      const span = skillGrowthSpanLabel(fam.observed_from, fam.observed_to);
      let html = '<div style="margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:6px">'
        + '<strong style="font-size:13.5px">' + e(familyLabel) + '</strong>'
        + '<span style="font-size:11.5px;color:#9ca3af">' + fam.student_count + ' student' + (fam.student_count === 1 ? '' : 's') + ' tracked' + (span ? ' · ' + e(span) : '') + '</span>'
        + '</div>';

      // Headline movers.
      const dimByKey = {};
      fam.dimensions.forEach(d => { dimByKey[d.key] = d; });
      const movers = [];
      if (fam.top_improved && dimByKey[fam.top_improved]) movers.push('<span style="color:#3f8f6b;font-weight:600">▲ Most improved:</span> ' + e(dimByKey[fam.top_improved].key + ' ' + dimByKey[fam.top_improved].label));
      if (fam.top_declined && dimByKey[fam.top_declined]) movers.push('<span style="color:#d9694f;font-weight:600">▼ Watch:</span> ' + e(dimByKey[fam.top_declined].key + ' ' + dimByKey[fam.top_declined].label));
      if (movers.length) html += '<div style="font-size:12px;color:#4b5563;margin:0 0 12px;display:flex;flex-wrap:wrap;gap:14px">' + movers.join('') + '</div>';

      const withData = fam.dimensions.filter(d => d.students_with_trend > 0);
      if (withData.length === 0) {
        return html + '<div style="font-size:12px;color:#9ca3af">No student has submitted one of these skills twice yet — growth appears once they do.</div>';
      }
      const MAX_DELTA = 1.5; // full half-bar at ±1.5 levels of movement
      withData.forEach(d => {
        const delta = d.mean_delta || 0;
        const half = Math.min(Math.abs(delta) / MAX_DELTA, 1) * 50;
        const col = delta > 0.25 ? '#3f8f6b' : (delta < -0.25 ? '#d9694f' : '#9ca3af');
        const deltaStr = (delta > 0 ? '+' : (delta < 0 ? '−' : '')) + Math.abs(delta).toFixed(1);
        html += '<div style="display:grid;grid-template-columns:150px 1fr 132px;gap:10px;align-items:center;margin:0 0 8px">';
        html += '<div style="font-size:12.5px"><strong>' + e(d.key) + '</strong> ' + e(d.label) + '</div>';
        // Diverging bar centred at zero.
        let bar = '<div style="position:relative;height:14px;background:#f3f0ea;border-radius:4px">'
          + '<div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:#d5cfc4"></div>';
        if (delta >= 0) {
          bar += '<div title="average within-student change" style="position:absolute;left:50%;height:100%;width:' + half.toFixed(1) + '%;background:' + col + ';border-radius:0 4px 4px 0"></div>';
        } else {
          bar += '<div title="average within-student change" style="position:absolute;right:50%;height:100%;width:' + half.toFixed(1) + '%;background:' + col + ';border-radius:4px 0 0 4px"></div>';
        }
        bar += '</div>';
        html += bar;
        html += '<div style="text-align:right;font-size:11.5px"><strong style="color:' + col + '">' + e(deltaStr) + ' lvl</strong>'
          + '<span style="color:#9ca3af"> · ' + d.improved + '↑ ' + d.declined + '↓</span>'
          + '<div style="color:#b8b0a2;font-size:10.5px">' + d.students_with_trend + ' with 2+ obs</div>'
          + '</div>';
        html += '</div>';
      });
      return html;
    }

    function renderSkillGrowth(g) {
      if (!g || (!g.writing && !g.maths)) {
        return '<div class="card-empty"><strong>No growth data yet</strong>Growth over time appears once students have been assessed on a skill more than once — usually after their second or third draft. It measures each student\'s own change, then averages it across the class.</div>';
      }
      let html = '';
      if (g.writing) html += renderSkillGrowthFamily(g.writing, 'Writing skills');
      if (g.writing && g.maths) html += '<div style="height:1px;background:#ece7de;margin:16px 0"></div>';
      if (g.maths) html += renderSkillGrowthFamily(g.maths, 'Maths skills');
      return html;
    }

    function renderMathsErrorCategories(d) {
      const subs = (d && d.total_maths_submissions) || 0;
      const students = (d && d.total_maths_students) || 0;
      const cats = (d && d.categories) || [];
      if (subs === 0) {
        return '<div class="card-empty"><strong>No maths submissions yet</strong>Once students submit maths drafts, the most common per-line errors (notation, justification, verb misreads, skipped steps) appear here.</div>';
      }
      if (subs < 3) {
        return '<div class="card-empty"><strong>Not enough data yet</strong>' + subs + ' maths submission' + (subs === 1 ? '' : 's') + ' so far. The error breakdown will populate once you have a few more.</div>';
      }
      if (cats.length === 0) {
        return '<div class="card-empty"><strong>No errors flagged</strong>Across ' + subs + ' maths submissions, ProofReady didn\'t flag any issues. Either the cohort is flying, or the tasks are too easy.</div>';
      }
      let html = '<div style="font-size:12.5px;color:#6b7280;margin-bottom:10px">Across <strong>' + students + '</strong> student' + (students === 1 ? '' : 's') + ' (' + subs + ' maths submission' + (subs === 1 ? '' : 's') + ', ' + (d.total_lines || 0) + ' lines). The bar is how many students showed each pattern — reteach the top one or two.</div>';
      const max = Math.max(1, ...cats.map(r => r.students || 0));
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));gap:8px">';
      cats.forEach(r => {
        const v = r.students || 0;
        const pct = (v / max) * 100;
        html += '<div class="bar-row" style="grid-template-columns:170px 1fr auto">'
          + '<div class="bar-label">' + e(r.label) + '</div>'
          + '<div class="bar-track"><div class="bar-fill" style="width:' + pct.toFixed(1) + '%"></div></div>'
          + '<div class="bar-value">' + v + ' student' + (v === 1 ? '' : 's') + '</div>'
          + '</div>';
      });
      html += '</div>';
      return html;
    }

    function cardHeader(title, sub) {
      let h = '<div class="card-h"><h3>' + e(title) + '</h3>';
      if (sub) h += '<span class="card-h-sub">' + e(sub) + '</span>';
      h += '</div>';
      return h;
    }

    function renderStudentSearchBox() {
      const selectedId = activeFilters.student_id || '';
      const label = selectedId ? (selectedStudentName || 'Selected student') : '';
      let html = '<div class="student-search" id="studentSearchWrap">';
      if (selectedId) {
        html += '<span class="student-mode-chip"><strong style="color:#111827">' + e(label) + '</strong>'
          + '<button class="student-mode-x" id="studentClearBtn" title="Back to cohort view">×</button>'
          + '</span>';
      } else {
        html += '<input type="text" class="student-search-input" id="studentSearchInput" placeholder="Search a student (by surname)…" autocomplete="off" />';
        html += '<span class="student-search-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg></span>';
        html += '<div class="student-search-dropdown" id="studentSearchDropdown"></div>';
      }
      html += '</div>';
      return html;
    }

    // Search-input state
    const STUDENT_SEARCH_MIN_CHARS = 1;
    const STUDENT_SEARCH_DEBOUNCE_MS = 120;
    let studentSearchDebounce = null;
    let studentSearchInflight = 0;
    let studentSearchHighlight = -1;
    let studentSearchResults = [];
    let studentSearchLastQuery = '';

    function wireStudentSearch() {
      const input = document.getElementById('studentSearchInput');
      const dropdown = document.getElementById('studentSearchDropdown');
      const clearBtn = document.getElementById('studentClearBtn');
      if (clearBtn) {
        clearBtn.addEventListener('click', () => {
          selectedStudentName = '';
          setFilter('student_id', null);
        });
      }
      if (!input || !dropdown) return;
      input.addEventListener('input', () => {
        const q = input.value.trim();
        if (studentSearchDebounce) clearTimeout(studentSearchDebounce);
        if (q.length < STUDENT_SEARCH_MIN_CHARS) {
          dropdown.classList.remove('visible');
          dropdown.innerHTML = '';
          studentSearchResults = [];
          studentSearchLastQuery = '';
          return;
        }
        // Show the dropdown immediately with a Searching… placeholder so
        // the user has feedback that something is happening, even before
        // the network round-trip resolves. Avoid flashing a fresh
        // skeleton when the user is just refining the query — keep the
        // previous results visible until the new ones arrive.
        if (studentSearchResults.length === 0) {
          dropdown.innerHTML = '<div class="student-search-empty">Searching…</div>';
          dropdown.classList.add('visible');
        }
        studentSearchDebounce = setTimeout(() => doStudentSearch(q), STUDENT_SEARCH_DEBOUNCE_MS);
      });
      input.addEventListener('keydown', (ev) => {
        if (ev.key === 'ArrowDown') {
          ev.preventDefault();
          if (studentSearchResults.length === 0) return;
          studentSearchHighlight = Math.min(studentSearchHighlight + 1, studentSearchResults.length - 1);
          paintStudentDropdown();
        } else if (ev.key === 'ArrowUp') {
          ev.preventDefault();
          studentSearchHighlight = Math.max(studentSearchHighlight - 1, 0);
          paintStudentDropdown();
        } else if (ev.key === 'Enter') {
          if (studentSearchHighlight >= 0 && studentSearchResults[studentSearchHighlight]) {
            ev.preventDefault();
            pickStudent(studentSearchResults[studentSearchHighlight]);
          }
        } else if (ev.key === 'Escape') {
          dropdown.classList.remove('visible');
        }
      });
      input.addEventListener('blur', () => {
        // Defer to allow click on dropdown row.
        setTimeout(() => dropdown.classList.remove('visible'), 150);
      });
      input.addEventListener('focus', () => {
        if (studentSearchResults.length > 0) dropdown.classList.add('visible');
      });
    }

    async function doStudentSearch(q) {
      const dropdown = document.getElementById('studentSearchDropdown');
      if (!dropdown) return;
      const myReq = ++studentSearchInflight;
      studentSearchLastQuery = q;
      const qs = '?q=' + encodeURIComponent(q) + (SCHOOL_ID_OVERRIDE ? '&school_id=' + encodeURIComponent(SCHOOL_ID_OVERRIDE) : '');
      const r = await authFetch('/api/insights-students-search' + qs);
      if (myReq !== studentSearchInflight) return;
      if (!r.ok) {
        dropdown.innerHTML = '<div class="student-search-empty">Search failed. Try again.</div>';
        dropdown.classList.add('visible');
        return;
      }
      const body = await r.json();
      studentSearchResults = body.rows || [];
      studentSearchHighlight = studentSearchResults.length > 0 ? 0 : -1;
      paintStudentDropdown();
    }

    function paintStudentDropdown() {
      const dropdown = document.getElementById('studentSearchDropdown');
      if (!dropdown) return;
      if (studentSearchResults.length === 0) {
        dropdown.innerHTML = '<div class="student-search-empty">No students found for &ldquo;' + e(studentSearchLastQuery) + '&rdquo;.</div>';
        dropdown.classList.add('visible');
        return;
      }
      let html = '';
      studentSearchResults.forEach((r, i) => {
        const cls = 'student-search-result' + (i === studentSearchHighlight ? ' is-highlighted' : '');
        const subline = [
          r.year_level ? 'Year ' + r.year_level : '',
          r.class_summary || '',
          r.email || '',
        ].filter(Boolean).join(' · ');
        html += '<div class="' + cls + '" data-student-pick="' + e(r.id) + '">'
          + '<div class="name">' + highlightMatch(r.display_name, studentSearchLastQuery) + '</div>'
          + '<div class="meta">' + e(subline) + '</div>'
          + '</div>';
      });
      dropdown.innerHTML = html;
      dropdown.classList.add('visible');
      dropdown.querySelectorAll('[data-student-pick]').forEach(el => {
        el.addEventListener('mousedown', (ev) => {
          ev.preventDefault();
          const id = el.dataset.studentPick;
          const row = studentSearchResults.find(r => r.id === id);
          if (row) pickStudent(row);
        });
      });
    }

    // Highlight the matched substring in the dropdown name so the user
    // can see why a result came back.
    function highlightMatch(name, q) {
      if (!q || !name) return e(name || '');
      const lower = name.toLowerCase();
      const ql = q.toLowerCase();
      const i = lower.indexOf(ql);
      if (i < 0) return e(name);
      return e(name.slice(0, i))
        + '<mark style="background:#fef3e6;color:#ed7615;padding:0 2px;border-radius:3px">'
        + e(name.slice(i, i + q.length))
        + '</mark>'
        + e(name.slice(i + q.length));
    }

    function pickStudent(row) {
      selectedStudentName = row.display_name || '';
      const dropdown = document.getElementById('studentSearchDropdown');
      if (dropdown) dropdown.classList.remove('visible');
      // Show an immediate loading state in the content area so the page
      // doesn't appear frozen while the student endpoint loads.
      showLoadingFor('Loading insights for ' + selectedStudentName + '…');
      setFilter('student_id', row.id);
    }

    // Render a loading state in the main content area. Used while the
    // student endpoint resolves, or on initial page load if we want a
    // friendlier message than the default boot string.
    function showLoadingFor(message) {
      const c = document.getElementById('content');
      if (!c) return;
      c.innerHTML = '<div class="loading"><div class="spinner" aria-hidden="true"></div>' + e(message || 'Loading…') + '</div>';
    }

    function renderTeacherClassPicker(cards) {
      // Class options come from the cards API, already scoped to the
      // teacher's owned classes (teacherIds = [user.id] on the server).
      const opts = (cards && cards.filters && cards.filters.options && cards.filters.options.classes) || [];
      const selected = (activeFilters.class_id || '').trim();
      let html = '<label style="display:inline-flex;align-items:center;gap:8px;font-size:13.5px;color:#374151;font-weight:500">'
        + 'Showing: '
        + '<select id="teacherClassPicker" style="font-family:inherit;font-size:13.5px;padding:6px 10px;border-radius:8px;border:1px solid #d1d5db;background:#fff;font-weight:500;cursor:pointer;min-width:240px">';
      html += '<option value=""' + (selected ? '' : ' selected') + '>All my classes</option>';
      opts.forEach(c => {
        const sel = selected === c.id ? ' selected' : '';
        const label = c.name + (c.course ? ' — ' + c.course : '');
        html += '<option value="' + e(c.id) + '"' + sel + '>' + e(label) + '</option>';
      });
      html += '</select></label>';
      return html;
    }

    function renderActivityCard(activity) {
      if (!activity || !activity.weeks || activity.weeks.length === 0) {
        return '<div class="card-empty"><strong>No submissions yet</strong>Activity will appear here once students start submitting drafts.</div>';
      }
      const weeks = activity.weeks;
      const total = activity.total_in_window || 0;
      const maxCount = Math.max(1, ...weeks.map(w => w.count));
      const W = 100, H = 60;
      const stepX = weeks.length > 1 ? (W / (weeks.length - 1)) : 0;
      const points = weeks.map((w, i) => ({
        x: i * stepX,
        y: H - (w.count / maxCount) * H,
        count: w.count,
        week_start: w.week_start,
      }));
      const linePath = 'M ' + points.map(p => p.x.toFixed(2) + ',' + p.y.toFixed(2)).join(' L ');
      const areaPath = linePath + ' L ' + W.toFixed(2) + ',' + H.toFixed(2) + ' L 0,' + H.toFixed(2) + ' Z';
      const firstLabel = new Date(weeks[0].week_start).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
      const lastLabel = new Date(weeks[weeks.length - 1].week_start).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
      let html = '<div class="sparkline-summary"><strong>' + total + '</strong>submission' + (total === 1 ? '' : 's') + ' in the last 12 weeks</div>';
      html += '<svg class="sparkline" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">';
      html += '<path class="area" d="' + areaPath + '"/>';
      html += '<path class="line" d="' + linePath + '"/>';
      points.forEach(p => {
        html += '<circle class="dot" cx="' + p.x.toFixed(2) + '" cy="' + p.y.toFixed(2) + '" r="1.4"><title>' + new Date(p.week_start).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }) + ': ' + p.count + '</title></circle>';
      });
      html += '</svg>';
      html += '<div class="sparkline-axis"><span>' + e(firstLabel) + '</span><span>' + e(lastLabel) + '</span></div>';
      return html;
    }

    function renderEngagementCard(engagement) {
      if (!engagement || !engagement.rows || engagement.rows.length === 0) {
        return '<div class="card-empty"><strong>No published tasks yet</strong>Bars appear here once teachers publish tasks in their classes.</div>';
      }
      const rows = engagement.rows;
      const max = Math.max(1, ...rows.map(r => r.submission_count || 0));
      let html = '<div class="bar-list">';
      rows.forEach(r => {
        const sub = r.submission_count || 0;
        const pct = (sub / max) * 100;
        const label = engagement.mode === 'classes' ? r.name : r.faculty;
        const meta = engagement.mode === 'classes'
          ? (r.teacher_name || '') + ' · ' + (r.task_count || 0) + ' task' + (r.task_count === 1 ? '' : 's')
          : (r.teacher_count || 0) + ' staff · ' + (r.task_count || 0) + ' task' + (r.task_count === 1 ? '' : 's');
        // Drill-down only on faculty mode (class mode has nothing extra to drill into).
        const drill = engagement.mode === 'faculty'
          ? ' clickable" data-drill-faculty="' + e(r.faculty)
          : '';
        html += '<div class="bar-row' + drill + '" title="' + (engagement.mode === 'faculty' ? 'Click to see teachers in this faculty' : e(label)) + '">'
          + '<div class="bar-label">' + e(label) + '<div class="bar-meta">' + e(meta) + '</div></div>'
          + '<div class="bar-track"><div class="bar-fill" style="width:' + pct.toFixed(1) + '%"></div></div>'
          + '<div class="bar-value">' + sub + '</div>'
          + '</div>';
      });
      html += '</div>';
      return html;
    }

    function renderMarkDistribution(dist) {
      if (!dist || !dist.total) {
        return '<div class="card-empty"><strong>No marks awarded yet</strong>This bucket shows the Common Grade Scale spread across all marked submissions.</div>';
      }
      const counts = dist.counts || {};
      const total = dist.total || 1;
      const bands = dist.bands || [{ code: 'A' }, { code: 'B' }, { code: 'C' }, { code: 'D' }, { code: 'E' }];
      let html = '<div class="band-list">';
      bands.forEach(b => {
        const n = counts[b.code] || 0;
        const pct = (n / total) * 100;
        const clickable = n > 0 ? ' clickable" data-drill-band="' + e(b.code) : '';
        html += '<div class="band-row band-' + e(b.code) + clickable + '" title="' + (n > 0 ? 'Click to see submissions in this band' : 'No submissions') + '">'
          + '<div class="band-letter">' + e(b.code) + '</div>'
          + '<div class="band-label">' + e(b.label || b.code) + '</div>'
          + '<div class="band-track"><div class="band-fill" style="width:' + Math.max(pct, n > 0 ? 1.5 : 0).toFixed(1) + '%"></div></div>'
          + '<div class="band-value">' + n + ' <span style="color:#9ca3af;font-weight:500;font-size:11px">(' + pct.toFixed(0) + '%)</span></div>'
          + '</div>';
      });
      html += '</div>';
      return html;
    }

    function renderMarkByFaculty(byFaculty) {
      const rows = (byFaculty && byFaculty.rows) || [];
      const bands = (byFaculty && byFaculty.bands) || [{ code: 'A' }, { code: 'B' }, { code: 'C' }, { code: 'D' }, { code: 'E' }];
      if (rows.length === 0) {
        return '<div class="card-empty"><strong>No marks per faculty yet</strong>Each faculty\'s grade-scale spread shows here once submissions are graded.</div>';
      }
      let html = '<div class="mark-faculty-grid">';
      rows.forEach(r => {
        const total = r.total || 1;
        html += '<div class="mark-faculty-card">';
        html += '<h5>' + e(r.faculty) + '<span class="count">' + r.total + ' marked</span></h5>';
        html += '<div class="mini-bands">';
        bands.forEach(b => {
          const n = (r.counts && r.counts[b.code]) || 0;
          const pct = (n / total) * 100;
          if (n > 0) html += '<div class="mini-band band-' + e(b.code) + '" style="flex:' + pct + '" title="' + e(b.code) + ': ' + n + '">' + (pct >= 9 ? e(b.code) : '') + '</div>';
        });
        html += '</div>';
        html += '</div>';
      });
      html += '</div>';
      return html;
    }

    function renderMarkingProgress(marking) {
      const total = (marking && marking.total) || 0;
      if (total === 0) {
        return '<div class="card-empty"><strong>No submissions yet</strong>Marking progress appears once students submit drafts.</div>';
      }
      const m = marking.marked || 0;
      const a = marking.awaiting_marking || 0;
      const u = marking.unmarked || 0;
      const pct = n => total > 0 ? (n / total) * 100 : 0;
      let html = '<div class="marking-stack">';
      if (m > 0) html += '<div class="marking-seg marked clickable" data-drill-marking="marked" style="flex:' + pct(m) + '" title="Marked — click to list">' + (pct(m) >= 12 ? m : '') + '</div>';
      if (a > 0) html += '<div class="marking-seg awaiting clickable" data-drill-marking="awaiting" style="flex:' + pct(a) + '" title="Awaiting marking — click to list">' + (pct(a) >= 12 ? a : '') + '</div>';
      if (u > 0) html += '<div class="marking-seg unmarked clickable" data-drill-marking="unmarked" style="flex:' + pct(u) + '" title="Unmarked — click to list">' + (pct(u) >= 12 ? u : '') + '</div>';
      html += '</div>';
      html += '<div class="marking-legend">';
      html += '<div class="marking-legend-item"><span class="marking-legend-dot marked"></span><strong>' + m + '</strong> marked</div>';
      html += '<div class="marking-legend-item"><span class="marking-legend-dot awaiting"></span><strong>' + a + '</strong> awaiting</div>';
      html += '<div class="marking-legend-item"><span class="marking-legend-dot unmarked"></span><strong>' + u + '</strong> unmarked</div>';
      html += '</div>';
      return html;
    }

    function renderTeacherActivity(rows) {
      if (!rows || rows.length === 0) {
        return '<div class="card-empty"><strong>No staff in scope yet</strong>Once teachers sign up with a matching school email domain, they appear here.</div>';
      }
      const now = Date.now();
      const ms30d = 30 * 24 * 60 * 60 * 1000;
      let html = '<table class="teachers-table"><thead><tr><th>Teacher</th><th style="text-align:right">Classes</th><th style="text-align:right">Tasks</th><th style="text-align:right">Last 30d</th><th>Last active</th></tr></thead><tbody>';
      rows.forEach(r => {
        let pill = '';
        let trClass = '';
        if (!r.last_active) {
          pill = '<span class="stale-pill never-pill">never</span>';
          trClass = 'stale';
        } else {
          const age = now - new Date(r.last_active).getTime();
          if (age > ms30d) {
            pill = '<span class="stale-pill">' + Math.floor(age / (24 * 60 * 60 * 1000)) + 'd ago</span>';
            trClass = 'stale';
          } else if (age < 7 * 24 * 60 * 60 * 1000) {
            pill = '<span class="stale-pill active-pill">active</span>';
          }
        }
        const last = r.last_active
          ? new Date(r.last_active).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' })
          : '—';
        html += '<tr class="clickable ' + trClass + '" data-drill-teacher="' + e(r.teacher_id) + '" data-teacher-name="' + e(r.name) + '">';
        html += '<td>' + e(r.name) + pill + '</td>';
        html += '<td style="text-align:right">' + r.class_count + '</td>';
        html += '<td style="text-align:right">' + r.task_count + '</td>';
        html += '<td style="text-align:right">' + r.tasks_last_30d + '</td>';
        html += '<td>' + e(last) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      return html;
    }

    function renderSynthesisCard(cards, synth) {
      const counts = (cards && cards.counts) || {};
      const tasksWithFb = counts.tasks_with_class_feedback || 0;
      const hasInsights = !!(synth && synth.insights);
      const canGenerate = tasksWithFb > 0;
      const lastGen = synth && synth.generated_at
        ? new Date(synth.generated_at).toLocaleString('en-AU', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
        : null;

      let html = genOverlay('synthesis');
      html += '<div class="synthesis-head">';
      html += '<div><h3>Leadership synthesis</h3>';
      if (hasInsights) {
        html += '<div class="meta">Based on ' + (synth.task_count || 0) + ' task' + (synth.task_count === 1 ? '' : 's') + ' with class-level feedback' + (lastGen ? ' · Last generated ' + e(lastGen) : '') + '</div>';
      } else if (canGenerate) {
        html += '<div class="meta">Rolls up class-level feedback from ' + tasksWithFb + ' task' + (tasksWithFb === 1 ? '' : 's') + ' into a school-level overview.</div>';
      } else {
        html += '<div class="meta">Available once teachers generate class-level feedback on at least one task.</div>';
      }
      html += '</div>';
      html += '</div>';

      html += '<div id="synthesisBody">';
      if (hasInsights) {
        html += renderInsights(synth.insights);
      } else if (!canGenerate) {
        html += '<div class="card-empty" style="padding:24px"><strong>No synthesis yet</strong>Ask teachers to open a task and click "Generate class feedback" — once any task has feedback, this card is included when you press "Generate Insights".</div>';
      } else {
        html += '<div class="card-empty" style="padding:24px"><strong>Ready to synthesise</strong>Use <strong>Generate Insights</strong> above to produce the synthesis.</div>';
      }
      html += '</div>';

      return html;
    }
  </script>
</body>
</html>
