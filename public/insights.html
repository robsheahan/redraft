<body>
  <nav class="nav">
    <a href="/" class="nav-brand"><img src="/proofreadybanner.png" alt="ProofReady"></a>
    <div class="nav-right">
      <span id="navUser"></span>
      <button class="nav-logout" onclick="logout()">Log out</button>
    </div>
  </nav>

  <div class="container" id="content">
    <div class="loading">Loading insights...</div>
  </div>

  <div class="site-footer">
    <a href="/contact.html">Contact</a>
    <a href="/privacy.html">Privacy Policy</a>
    <a href="/terms.html">Terms &amp; Conditions</a>
    <a href="/compliance.html">Compliance</a>
    <a href="/admin.html" class="admin-only" style="display:none">Admin</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/app.js"></script>
  <script>
    const e = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
    let currentData = null;
    let currentCards = null;

    // Global admins drill into a specific school via /insights.html?school_id=…
    // Everyone else resolves their own school server-side.
    const SCHOOL_ID_OVERRIDE = new URLSearchParams(window.location.search).get('school_id') || '';

    // Active filter state (synced to URL). UI elements + every API call
    // consult this; updating it triggers a refetch + re-render.
    const FILTER_KEYS = ['faculty', 'course', 'class_id', 'year_level'];
    function readFiltersFromUrl() {
      const u = new URLSearchParams(window.location.search);
      const out = {};
      FILTER_KEYS.forEach(k => { const v = (u.get(k) || '').trim(); if (v) out[k] = v; });
      return out;
    }
    let activeFilters = readFiltersFromUrl();
    function buildQueryString(extra = {}) {
      const u = new URLSearchParams();
      if (SCHOOL_ID_OVERRIDE) u.set('school_id', SCHOOL_ID_OVERRIDE);
      FILTER_KEYS.forEach(k => { if (activeFilters[k]) u.set(k, activeFilters[k]); });
      Object.entries(extra).forEach(([k, v]) => { if (v != null && v !== '') u.set(k, String(v)); });
      const s = u.toString();
      return s ? '?' + s : '';
    }
    function updateUrlForFilters() {
      const u = new URLSearchParams(window.location.search);
      FILTER_KEYS.forEach(k => {
        if (activeFilters[k]) u.set(k, activeFilters[k]); else u.delete(k);
      });
      const qs = u.toString();
      const newUrl = window.location.pathname + (qs ? '?' + qs : '');
      window.history.replaceState({}, '', newUrl);
    }
    function setFilter(key, value) {
      if (value == null || value === '') delete activeFilters[key];
      else activeFilters[key] = String(value);
      updateUrlForFilters();
      reloadData();
    }
    function clearAllFilters() {
      activeFilters = {};
      updateUrlForFilters();
      reloadData();
    }
    // Legacy helper preserved for old call sites.
    const SCHOOL_QS = SCHOOL_ID_OVERRIDE ? '?school_id=' + encodeURIComponent(SCHOOL_ID_OVERRIDE) : '';
    function withSchoolParam(url) {
      if (!SCHOOL_ID_OVERRIDE) return url;
      return url + (url.indexOf('?') >= 0 ? '&' : '?') + 'school_id=' + encodeURIComponent(SCHOOL_ID_OVERRIDE);
    }

    (async () => {
      const user = await requireAuth();
      if (!user) return;
      document.getElementById('navUser').textContent = user.email;

      await reloadData();
    })();

    // Token-based in-flight guard so rapid filter changes don't race.
    // Only the most recent reloadData() call is allowed to mutate state +
    // re-render; earlier ones bail out as soon as a newer call starts.
    let reloadToken = 0;
    async function reloadData() {
      const myToken = ++reloadToken;
      const container = document.getElementById('content');
      const qs = buildQueryString();
      const [cardsRes, synthRes] = await Promise.all([
        authFetch('/api/insights-cards' + qs),
        authFetch('/api/insights-synthesis' + qs),
      ]);
      if (myToken !== reloadToken) return; // a newer reload superseded us
      if (!cardsRes.ok) {
        if (cardsRes.status === 404 || cardsRes.status === 403) {
          container.innerHTML =
            '<div class="empty-state">' +
              '<div class="empty-icon">🔒</div>' +
              '<h3>You don\'t have permission to view this page</h3>' +
              '<p>The insights dashboard is for school leadership. If you should have access, please speak to your school\'s ProofReady administrator and ask them to add you as a leader.</p>' +
              '<a href="/teacher.html" class="back-cta">Back to your dashboard</a>' +
            '</div>';
          return;
        }
        const err = await cardsRes.json().catch(() => ({}));
        container.innerHTML = '<div class="error-msg">' + e(err.error || 'Could not load insights.') + '</div>';
        return;
      }
      currentCards = await cardsRes.json();
      currentData = synthRes.ok ? await synthRes.json() : { school: currentCards.school, caller_role: currentCards.caller_role, insights: null };
      render();
    }

    function render() {
      const c = document.getElementById('content');
      const d = currentData;
      let html = '';

      // Header
      html += '<div class="page-header">';
      if (SCHOOL_ID_OVERRIDE) {
        html += '<a href="/admin.html" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#6b7280;text-decoration:none;font-weight:500;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.1);border-radius:6px;padding:5px 12px;margin-bottom:12px">← Back to admin overview</a>';
      }
      html += '<h1>School Insights';
      if (d.caller_role) {
        html += '<span class="role-pill">' + e(d.caller_role) + '</span>';
      }
      html += '</h1>';
      html += '<div class="school-name">' + e(d.school.name) + '</div>';
      html += '</div>';

      // KPI strip (clickable — expands a detail panel below)
      // Prefer cards-endpoint counts (faculty-scoped) over synthesis stats.
      const s = (currentCards && currentCards.counts) || d.stats || {};
      const tasksWithFb = (s.tasks_with_class_feedback != null) ? s.tasks_with_class_feedback : (s.tasks_with_feedback || 0);
      const totalTasks = (s.tasks != null) ? s.tasks : (s.tasks_total || 0);
      html += '<div class="kpi-strip">';
      html += kpi('teachers',    'Teachers',    s.teachers || 0);
      html += kpi('classes',     'Classes',     s.classes || 0);
      html += kpi('tasks',       'Tasks',       totalTasks, tasksWithFb + ' with class feedback');
      html += kpi('submissions', 'Submissions', s.submissions || 0);
      html += '</div>';

      // Filter bar
      html += renderFilterBar(currentCards);

      // Detail panel — populated when a KPI is clicked
      html += '<div class="detail-panel" id="detailPanel"></div>';

      // Faculty-restricted banner (leaders scoped to specific KLAs)
      const restricted = currentCards && currentCards.restricted_faculties;
      if (restricted && restricted.length > 0) {
        html += '<div class="card" style="grid-column:span 12;border-left:3px solid #ed7615;margin-bottom:12px">'
          + '<div style="font-size:11px;font-weight:700;color:#b45309;letter-spacing:0.4px;text-transform:uppercase;margin-bottom:4px">Faculty-restricted view</div>'
          + '<div style="font-size:13.5px;color:#374151;line-height:1.55">You can see data for '
          + restricted.map(f => '<strong>' + e(f) + '</strong>').join(', ')
          + ' only. School-wide aggregates are hidden — ask your school admin if you need broader access.</div>'
          + '</div>';
      }

      // Populated card grid
      html += renderCardsGrid(currentCards, d);

      // Manage access (admins only)
      if (d.caller_role === 'admin') {
        html += '<div class="access-section">';
        html += '<h2>Manage access</h2>';
        html += '<p class="sub">Every staff member registered at ' + e(d.school.name) + ' (matched by email domain) is listed below. Click a row to set what they can see.</p>';
        html += '<div id="membersTable"><div class="detail-loading">Loading staff list...</div></div>';
        html += '</div>';
      }

      // Modal scaffold (always present in DOM; only opened by admins)
      html += '<div class="modal-backdrop" id="accessModal">' + buildModalShell() + '</div>';

      c.innerHTML = html;

      const btn = document.getElementById('generateBtn');
      if (btn) btn.addEventListener('click', generate);

      // Wire KPI click handlers
      document.querySelectorAll('.kpi').forEach(el => {
        el.addEventListener('click', () => toggleDetail(el.dataset.kind));
      });

      // Wire filter bar
      wireFilterBar();

      // Wire card drill-down handlers
      wireCardDrilldowns();

      // Wire LLM card Generate buttons
      document.querySelectorAll('[data-llm-generate]').forEach(b => {
        b.addEventListener('click', () => generateLLMCard(b.dataset.llmGenerate));
      });

      // Wire Manage access controls + load staff list
      if (d.caller_role === 'admin') {
        loadMembers();
      }

      // Modal close-on-backdrop
      const backdrop = document.getElementById('accessModal');
      backdrop.addEventListener('click', (ev) => {
        if (ev.target === backdrop) closeAccessModal();
      });
    }

    function renderFilterBar(cards) {
      const opts = (cards && cards.filters && cards.filters.options) || { faculties: [], courses: [], classes: [], year_levels: [] };
      const denied = cards && cards.filters && cards.filters.denied;
      const labelFor = (key) => {
        const v = activeFilters[key];
        if (!v) return null;
        if (key === 'class_id') {
          const cls = (opts.classes || []).find(c => c.id === v);
          return cls ? cls.name : null;
        }
        if (key === 'year_level') return 'Year ' + v;
        return v;
      };
      const facultyLocked = cards && cards.restricted_faculties && cards.restricted_faculties.length > 0;

      let html = '<div class="filter-bar">';
      html += '<span class="filter-lead">Filter</span>';
      // Year level
      html += filterPill('year_level', 'Year level', labelFor('year_level'), (opts.year_levels || []).map(y => ({ value: String(y), label: 'Year ' + y })));
      // Faculty (clamped to allowed faculties for restricted leaders)
      const facultyOpts = (opts.faculties || []).map(f => ({ value: f, label: f }));
      html += filterPill('faculty', 'Faculty' + (facultyLocked ? ' (scoped)' : ''), labelFor('faculty'), facultyOpts);
      // Course (filtered by faculty if set)
      const courseOpts = (opts.courses || []).map(c => ({ value: c, label: c }));
      html += filterPill('course', 'Course', labelFor('course'), courseOpts);
      // Class (filtered by faculty/course if set)
      const classOpts = (opts.classes || [])
        .filter(c => !activeFilters.faculty || c.faculty === activeFilters.faculty)
        .filter(c => !activeFilters.course || c.course === activeFilters.course)
        .map(c => ({ value: c.id, label: c.name || '(untitled)', meta: c.course }));
      html += filterPill('class_id', 'Class', labelFor('class_id'), classOpts);

      // Active chips
      const activeKeys = FILTER_KEYS.filter(k => activeFilters[k]);
      if (activeKeys.length > 0) {
        html += '<div class="filter-chips">';
        activeKeys.forEach(k => {
          html += '<span class="filter-chip">' + e(labelFor(k) || '') + ' <button class="filter-chip-x" data-clear-filter="' + e(k) + '" title="Remove filter">×</button></span>';
        });
        html += '<button class="filter-clear" id="clearAllFiltersBtn">Clear all</button>';
        html += '</div>';
      }
      html += '</div>';

      if (denied) {
        html += '<div class="filter-denied"><strong>Filter outside your access.</strong> You\'re asking for data in a faculty your school admin hasn\'t granted you. Remove the faculty filter or pick one of your assigned KLAs.</div>';
      }
      return html;
    }

    const ALL_LABELS = {
      year_level: 'All years',
      faculty: 'All faculties',
      course: 'All courses',
      class_id: 'All classes',
    };

    function filterPill(key, label, currentVal, options) {
      const isActive = !!currentVal;
      let html = '<div class="filter-pill" data-filter-pill="' + e(key) + '">';
      html += '<button class="filter-pill-btn ' + (isActive ? 'is-active' : '') + '" data-filter-toggle="' + e(key) + '">'
        + '<span>' + e(label) + (currentVal ? ': ' + e(String(currentVal)) : '') + '</span><span class="chev">▾</span></button>';
      html += '<div class="filter-menu">';
      // Always-visible "All X" option at the top. Highlighted when no
      // filter is active for this pill.
      const allLabel = ALL_LABELS[key] || 'All';
      const allSel = isActive ? '' : 'is-selected';
      html += '<button class="filter-option ' + allSel + '" data-filter-set="' + e(key) + '" data-filter-value="">' + e(allLabel) + '</button>';
      if (options.length === 0) {
        html += '<div class="filter-option" style="color:#9ca3af;cursor:default;font-style:italic">No options yet</div>';
      } else {
        options.forEach(o => {
          const sel = currentVal && String(currentVal) === String(o.value) ? 'is-selected' : '';
          html += '<button class="filter-option ' + sel + '" data-filter-set="' + e(key) + '" data-filter-value="' + e(String(o.value)) + '">'
            + e(o.label)
            + (o.meta ? '<span class="opt-meta">' + e(o.meta) + '</span>' : '')
            + '</button>';
        });
      }
      html += '</div></div>';
      return html;
    }

    function wireFilterBar() {
      document.querySelectorAll('[data-filter-toggle]').forEach(btn => {
        btn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const pill = btn.closest('.filter-pill');
          const wasOpen = pill.classList.contains('open');
          document.querySelectorAll('.filter-pill.open').forEach(p => p.classList.remove('open'));
          if (!wasOpen) pill.classList.add('open');
        });
      });
      document.querySelectorAll('[data-filter-set]').forEach(btn => {
        btn.addEventListener('click', () => {
          const key = btn.dataset.filterSet;
          const val = btn.dataset.filterValue || '';
          // Selecting a class implies its course/faculty too — keep simple,
          // don't cascade for v1; let the leader manually narrow.
          setFilter(key, val);
        });
      });
      document.querySelectorAll('[data-clear-filter]').forEach(btn => {
        btn.addEventListener('click', () => setFilter(btn.dataset.clearFilter, ''));
      });
      const clearAll = document.getElementById('clearAllFiltersBtn');
      if (clearAll) clearAll.addEventListener('click', clearAllFilters);
      // Close menus on outside click
      document.addEventListener('click', (ev) => {
        if (!ev.target.closest('.filter-pill')) {
          document.querySelectorAll('.filter-pill.open').forEach(p => p.classList.remove('open'));
        }
      });
    }

    // ─────────────── Card drill-downs ───────────────

    function wireCardDrilldowns() {
      // Faculty engagement bars
      document.querySelectorAll('[data-drill-faculty]').forEach(el => {
        el.addEventListener('click', () => openDrilldown(el, 'faculty', { faculty: el.dataset.drillFaculty }));
      });
      // Mark distribution band rows
      document.querySelectorAll('[data-drill-band]').forEach(el => {
        el.addEventListener('click', () => openDrilldown(el, 'band', { band: el.dataset.drillBand }));
      });
      // Teacher activity rows
      document.querySelectorAll('[data-drill-teacher]').forEach(el => {
        el.addEventListener('click', () => openDrilldown(el, 'teacher', { teacher_id: el.dataset.drillTeacher, name: el.dataset.teacherName }));
      });
      // Marking segments
      document.querySelectorAll('[data-drill-marking]').forEach(el => {
        el.addEventListener('click', () => openDrilldown(el, 'marking', { marking_status: el.dataset.drillMarking }));
      });
    }

    async function openDrilldown(triggerEl, kind, params) {
      const card = triggerEl.closest('.card');
      if (!card) return;
      let panel = card.querySelector('.card-drilldown');
      if (!panel) {
        panel = document.createElement('div');
        panel.className = 'card-drilldown';
        card.appendChild(panel);
      }
      // Toggle close if already showing this drill
      if (panel.dataset.drillKey === kind + ':' + JSON.stringify(params)) {
        panel.classList.remove('visible');
        panel.innerHTML = '';
        panel.dataset.drillKey = '';
        return;
      }
      panel.dataset.drillKey = kind + ':' + JSON.stringify(params);
      panel.classList.add('visible');
      panel.innerHTML = '<div class="loading-row">Loading...</div>';

      try {
        let html = '';
        if (kind === 'faculty') {
          // Show teachers in that faculty (combines current filters)
          const res = await authFetch('/api/insights-detail' + buildQueryString({ kind: 'teachers', faculty: params.faculty }));
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed to load');
          html = drillHeader(params.faculty + ' — teachers') + renderTeachersDrill(data.rows || []);
        } else if (kind === 'band') {
          const res = await authFetch('/api/insights-detail' + buildQueryString({ kind: 'submissions', band: params.band }));
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed to load');
          html = drillHeader('Band ' + params.band + ' — submissions') + renderSubmissionsDrill(data.rows || [], data.truncated_at);
        } else if (kind === 'teacher') {
          const res = await authFetch('/api/insights-detail' + buildQueryString({ kind: 'submissions', teacher_id: params.teacher_id }));
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed to load');
          html = drillHeader(params.name + ' — recent submissions') + renderSubmissionsDrill(data.rows || [], data.truncated_at);
        } else if (kind === 'marking') {
          const label = ({ marked: 'Marked', awaiting: 'Awaiting marking', unmarked: 'Unmarked' })[params.marking_status] || params.marking_status;
          const res = await authFetch('/api/insights-detail' + buildQueryString({ kind: 'submissions', marking_status: params.marking_status }));
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed to load');
          html = drillHeader(label + ' — submissions') + renderSubmissionsDrill(data.rows || [], data.truncated_at);
        }
        panel.innerHTML = html;
        const close = panel.querySelector('.close-x');
        if (close) close.addEventListener('click', () => { panel.classList.remove('visible'); panel.innerHTML = ''; panel.dataset.drillKey = ''; });
      } catch (err) {
        panel.innerHTML = '<div class="loading-row" style="color:#dc2626">' + e(err.message) + '</div>';
      }
    }

    function drillHeader(label) {
      return '<h5>' + e(label) + ' <button class="close-x">×</button></h5>';
    }

    function renderTeachersDrill(rows) {
      if (rows.length === 0) return '<div class="loading-row">No teachers match this filter.</div>';
      let html = '<table><thead><tr><th>Teacher</th><th>Email</th><th style="text-align:right">Classes</th><th style="text-align:right">Tasks</th></tr></thead><tbody>';
      rows.forEach(r => {
        html += '<tr><td>' + e(r.name) + '</td><td style="font-family:monospace;color:#6b7280">' + e(r.email) + '</td><td style="text-align:right">' + r.class_count + '</td><td style="text-align:right">' + r.task_count + '</td></tr>';
      });
      html += '</tbody></table>';
      return html;
    }

    function renderSubmissionsDrill(rows, truncatedAt) {
      if (rows.length === 0) return '<div class="loading-row">No submissions match this filter.</div>';
      let html = '<table><thead><tr><th>Student</th><th>Task</th><th>Course</th><th>Draft</th><th>Mark</th><th>Date</th></tr></thead><tbody>';
      rows.forEach(r => {
        const date = r.created_at ? new Date(r.created_at).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }) : '—';
        let mark = '—';
        if (r.graded && r.total_mark != null) mark = r.total_mark + (r.total_marks_max ? '/' + r.total_marks_max : '') + (r.band ? ' (' + r.band + ')' : '');
        else if (r.submitted_for_marking) mark = '<span style="color:#1e40af">awaiting</span>';
        html += '<tr><td>' + e(r.student_name) + '</td><td>' + e(r.task_title) + '</td><td>' + e(r.course || '—') + '</td><td>v' + r.draft_version + '</td><td>' + mark + '</td><td style="font-family:monospace;color:#6b7280">' + e(date) + '</td></tr>';
      });
      html += '</tbody></table>';
      if (truncatedAt) html += '<div class="loading-row" style="text-align:left;padding-left:8px">Showing the ' + truncatedAt + ' most recent matches.</div>';
      return html;
    }

    function buildModalShell() {
      return [
        '<div class="modal" onclick="event.stopPropagation()">',
        '  <div class="modal-head"><h3 id="modalTitle">Set access</h3><button class="modal-close" onclick="closeAccessModal()">×</button></div>',
        '  <div class="modal-body">',
        '    <div class="modal-target" id="modalTarget"></div>',
        '    <div class="modal-group" id="modalRoleGroup">',
        '      <h4>Access level</h4>',
        '      <label class="modal-radio" data-role="none"><input type="radio" name="modalRole" value="none"><span class="label">No access</span><div class="desc">They keep their teacher account but cannot open this dashboard.</div></label>',
        '      <label class="modal-radio" data-role="leader"><input type="radio" name="modalRole" value="leader"><span class="label">Leader — view insights</span><div class="desc">Read-only access. Can be scoped to specific faculties below.</div></label>',
        '      <label class="modal-radio" data-role="admin"><input type="radio" name="modalRole" value="admin"><span class="label">Admin — view + manage other members</span><div class="desc">Full access to every faculty plus this Manage access panel.</div></label>',
        '    </div>',
        '    <div class="modal-group" id="modalFacultiesGroup">',
        '      <h4>Faculties they can view</h4>',
        '      <label class="modal-faculty-toggle"><input type="checkbox" id="modalFacAll"><span class="lab">All faculties (no restriction)</span></label>',
        '      <div class="modal-faculties" id="modalFacGrid"></div>',
        '    </div>',
        '  </div>',
        '  <div class="modal-actions">',
        '    <div class="left"><button class="danger" id="modalRemove" style="display:none">Remove access</button></div>',
        '    <div><button onclick="closeAccessModal()">Cancel</button> <button class="primary" id="modalSave">Save</button></div>',
        '  </div>',
        '</div>',
      ].join('\n');
    }

    function kpi(kind, label, value, sub) {
      let html = '<button type="button" class="kpi" data-kind="' + e(kind) + '">';
      html += '<div class="kpi-label">' + e(label) + ' <span class="chev">▾</span></div>';
      html += '<div class="kpi-value">' + e(String(value)) + '</div>';
      if (sub) html += '<div class="kpi-sub">' + e(String(sub)) + '</div>';
      html += '</button>';
      return html;
    }

    let activeKind = null;

    async function toggleDetail(kind) {
      const panel = document.getElementById('detailPanel');
      document.querySelectorAll('.kpi').forEach(el => el.classList.toggle('is-active', el.dataset.kind === kind && activeKind !== kind));
      if (activeKind === kind) {
        panel.classList.remove('visible');
        panel.innerHTML = '';
        activeKind = null;
        return;
      }
      activeKind = kind;
      panel.classList.add('visible');
      panel.innerHTML = '<div class="detail-loading">Loading...</div>';

      try {
        const res = await authFetch(withSchoolParam('/api/insights-detail?kind=' + encodeURIComponent(kind)));
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Could not load list.');
        panel.innerHTML = renderDetail(kind, data.rows || [], data.truncated_at);
      } catch (err) {
        panel.innerHTML = '<div class="detail-empty">' + e(err.message) + '</div>';
      }
    }

    function renderDetail(kind, rows, truncatedAt) {
      const title = ({
        teachers: 'Teachers',
        classes: 'Classes',
        tasks: 'Tasks',
        submissions: 'Recent submissions',
      })[kind] || kind;
      if (rows.length === 0) {
        return '<h3>' + e(title) + '</h3><div class="detail-empty">No entries yet.</div>';
      }
      let html = '<h3>' + e(title) + ' <span style="color:#9ca3af;font-weight:500;font-size:12px">(' + rows.length + ')</span></h3>';

      if (kind === 'teachers') {
        html += '<table class="detail-table"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th style="text-align:right">Classes</th><th style="text-align:right">Tasks</th></tr></thead><tbody>';
        rows.forEach(r => {
          const rolePill = r.role
            ? '<span class="detail-role-pill ' + e(r.role) + '">' + e(r.role) + '</span>'
            : '<span class="detail-role-pill none">teacher</span>';
          html += '<tr><td>' + e(r.name) + '</td><td class="detail-mono">' + e(r.email) + '</td><td>' + rolePill + '</td><td style="text-align:right">' + e(String(r.class_count)) + '</td><td style="text-align:right">' + e(String(r.task_count)) + '</td></tr>';
        });
        html += '</tbody></table>';
      } else if (kind === 'classes') {
        html += '<table class="detail-table"><thead><tr><th>Class</th><th>Course</th><th>Teacher</th><th>Code</th><th style="text-align:right">Students</th><th style="text-align:right">Tasks</th></tr></thead><tbody>';
        rows.forEach(r => {
          html += '<tr><td>' + e(r.name) + '</td><td>' + e(r.course || '—') + '</td><td>' + e(r.teacher_name) + '</td><td class="detail-mono">' + e(r.code || '—') + '</td><td style="text-align:right">' + e(String(r.student_count)) + '</td><td style="text-align:right">' + e(String(r.task_count)) + '</td></tr>';
        });
        html += '</tbody></table>';
      } else if (kind === 'tasks') {
        html += '<table class="detail-table"><thead><tr><th>Task</th><th>Course</th><th>Class</th><th>Teacher</th><th style="text-align:right">Submissions</th><th>Feedback</th></tr></thead><tbody>';
        rows.forEach(r => {
          const fbPill = r.has_class_feedback ? '✓' : '—';
          html += '<tr><td>' + e(r.title) + (r.published ? '' : ' <span style="font-size:10px;color:#9ca3af;text-transform:uppercase">(draft)</span>') + '</td><td>' + e(r.course || '—') + '</td><td>' + e(r.class_name) + '</td><td>' + e(r.teacher_name) + '</td><td style="text-align:right">' + e(String(r.submission_count)) + '</td><td style="text-align:center;color:' + (r.has_class_feedback ? '#16a34a' : '#d1d5db') + '">' + fbPill + '</td></tr>';
        });
        html += '</tbody></table>';
      } else if (kind === 'submissions') {
        html += '<table class="detail-table"><thead><tr><th>Student</th><th>Task</th><th>Course</th><th>Draft</th><th>Status</th><th>Date</th></tr></thead><tbody>';
        rows.forEach(r => {
          const date = r.created_at ? new Date(r.created_at).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : '—';
          let status;
          if (r.graded) status = '<span style="color:#15803d;font-weight:600">Marked' + (r.total_mark != null ? ' · ' + r.total_mark : '') + '</span>';
          else if (r.submitted_for_marking) status = '<span style="color:#1e40af;font-weight:600">Ready to mark</span>';
          else status = '<span style="color:#b45309">Unmarked</span>';
          html += '<tr><td>' + e(r.student_name) + '</td><td>' + e(r.task_title) + '</td><td>' + e(r.course || '—') + '</td><td>v' + e(String(r.draft_version)) + '</td><td>' + status + '</td><td class="detail-mono">' + e(date) + '</td></tr>';
        });
        html += '</tbody></table>';
        if (truncatedAt && rows.length >= truncatedAt) {
          html += '<div class="detail-empty" style="text-align:left;padding:10px 4px 0;color:#9ca3af">Showing the ' + truncatedAt + ' most recent submissions.</div>';
        }
      }
      return html;
    }

    let availableFaculties = [];
    let staffCache = [];

    async function loadMembers() {
      const target = document.getElementById('membersTable');
      if (!target || !currentData) return;
      try {
        const res = await authFetch('/api/school-members?school_id=' + encodeURIComponent(currentData.school.id));
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Could not load staff.');
        availableFaculties = data.faculties || [];
        staffCache = data.members || [];
        target.innerHTML = renderStaffList(staffCache);
        target.querySelectorAll('tr.clickable').forEach(tr => {
          tr.addEventListener('click', () => openAccessModal(tr.dataset.userId));
        });
      } catch (err) {
        target.innerHTML = '<div class="detail-empty">' + e(err.message) + '</div>';
      }
    }

    function renderStaffList(staff) {
      if (staff.length === 0) {
        return '<div class="detail-empty">No school staff registered yet. Once teachers sign up with a matching school email domain, they will appear here.</div>';
      }
      let html = '<table class="access-table"><thead><tr><th>Name</th><th>Email</th><th>Access</th></tr></thead><tbody>';
      staff.forEach(s => {
        html += '<tr class="clickable" data-user-id="' + e(s.user_id) + '">';
        html += '<td>' + e(s.name) + '</td>';
        html += '<td class="detail-mono">' + e(s.email) + '</td>';
        html += '<td>' + renderGrantSummary(s) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      return html;
    }

    function renderGrantSummary(s) {
      if (s.role === 'admin') {
        return '<span class="detail-role-pill admin">Admin — full access</span>';
      }
      if (s.role === 'leader') {
        if (!s.faculties || s.faculties.length === 0) {
          return '<span class="detail-role-pill leader">Leader — all faculties</span>';
        }
        return '<span class="detail-role-pill leader">Leader</span> '
          + s.faculties.map(f => '<span class="access-faculty-chip">' + e(f) + '</span>').join('');
      }
      return '<span class="access-grant-summary none">No access</span>';
    }

    let modalTargetUserId = null;

    function openAccessModal(userId) {
      const s = staffCache.find(x => x.user_id === userId);
      if (!s) return;
      modalTargetUserId = userId;

      document.getElementById('modalTitle').textContent = 'Set access for ' + s.name;
      document.getElementById('modalTarget').innerHTML =
        '<div class="name">' + e(s.name) + '</div><div class="email">' + e(s.email) + '</div>';

      // Role radios
      const currentRole = s.role || 'none';
      document.querySelectorAll('input[name="modalRole"]').forEach(r => {
        r.checked = (r.value === currentRole);
      });
      syncRoleHighlight();

      // Faculty checkboxes
      const grid = document.getElementById('modalFacGrid');
      grid.innerHTML = availableFaculties.map(f =>
        '<label class="modal-faculty"><input type="checkbox" value="' + e(f) + '"> ' + e(f) + '</label>'
      ).join('');
      const facCheckboxes = grid.querySelectorAll('input[type="checkbox"]');
      const selected = new Set(s.faculties || []);
      facCheckboxes.forEach(cb => { cb.checked = selected.has(cb.value); });
      facCheckboxes.forEach(cb => cb.addEventListener('change', () => {
        cb.closest('.modal-faculty').classList.toggle('is-checked', cb.checked);
        document.getElementById('modalFacAll').checked = false;
        syncFacToggle();
      }));
      grid.querySelectorAll('.modal-faculty').forEach(el => {
        el.classList.toggle('is-checked', el.querySelector('input').checked);
      });
      // "All faculties" toggle
      const allCb = document.getElementById('modalFacAll');
      allCb.checked = (currentRole === 'leader' && selected.size === 0);
      allCb.onchange = () => {
        if (allCb.checked) {
          facCheckboxes.forEach(cb => { cb.checked = false; cb.closest('.modal-faculty').classList.remove('is-checked'); });
        }
      };
      syncFacToggle();

      // Wire role radios to re-sync UI
      document.querySelectorAll('input[name="modalRole"]').forEach(r => r.onchange = () => {
        syncRoleHighlight();
        syncFacToggle();
      });

      // Remove button visibility
      const removeBtn = document.getElementById('modalRemove');
      removeBtn.style.display = s.role ? '' : 'none';
      removeBtn.onclick = handleRemove;

      // Save button
      document.getElementById('modalSave').onclick = handleSave;

      document.getElementById('accessModal').classList.add('visible');
    }

    function closeAccessModal() {
      document.getElementById('accessModal').classList.remove('visible');
      modalTargetUserId = null;
    }

    function syncRoleHighlight() {
      document.querySelectorAll('.modal-radio').forEach(r => {
        const input = r.querySelector('input');
        r.classList.toggle('is-active', input.checked);
      });
    }

    function syncFacToggle() {
      const role = document.querySelector('input[name="modalRole"]:checked')?.value || 'none';
      const facGroup = document.getElementById('modalFacultiesGroup');
      // Faculties only apply to leader. Hide for admin/none.
      facGroup.style.display = role === 'leader' ? '' : 'none';
    }

    async function handleSave() {
      const role = document.querySelector('input[name="modalRole"]:checked')?.value;
      if (!role) return;
      const btn = document.getElementById('modalSave');
      btn.disabled = true; btn.textContent = 'Saving...';
      try {
        if (role === 'none') {
          // Remove the grant entirely
          const res = await authFetch('/api/school-members?school_id=' + encodeURIComponent(currentData.school.id) + '&user_id=' + encodeURIComponent(modalTargetUserId), { method: 'DELETE' });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed to update.');
        } else {
          let faculties = [];
          if (role === 'leader') {
            const allCb = document.getElementById('modalFacAll');
            if (!allCb.checked) {
              faculties = Array.from(document.querySelectorAll('#modalFacGrid input[type="checkbox"]:checked')).map(cb => cb.value);
              if (faculties.length === 0) {
                btn.disabled = false; btn.textContent = 'Save';
                alert('Pick at least one faculty, or check "All faculties" to grant unrestricted access.');
                return;
              }
            }
          }
          const res = await authFetch('/api/school-members', {
            method: 'PUT',
            body: JSON.stringify({ school_id: currentData.school.id, user_id: modalTargetUserId, role, faculties }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed to update.');
        }
        closeAccessModal();
        await loadMembers();
      } catch (err) {
        alert(err.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Save';
      }
    }

    async function handleRemove() {
      const s = staffCache.find(x => x.user_id === modalTargetUserId);
      if (!s) return;
      if (!confirm('Remove ' + s.name + '\'s access to the insights dashboard?')) return;
      try {
        const res = await authFetch('/api/school-members?school_id=' + encodeURIComponent(currentData.school.id) + '&user_id=' + encodeURIComponent(modalTargetUserId), { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to remove.');
        closeAccessModal();
        await loadMembers();
      } catch (err) {
        alert(err.message);
      }
    }

    function renderInsights(ins) {
      if (!ins) return '';
      let html = '';

      if (ins.restricted_view) {
        const fac = (ins.viewer_faculties || []).map(f => '<strong>' + e(f) + '</strong>').join(', ');
        html += '<div class="section" style="border-left:3px solid #ed7615">'
          + '<div class="section-title" style="color:#b45309;letter-spacing:0.5px">FACULTY-RESTRICTED VIEW</div>'
          + '<p class="section-text" style="font-size:14px">You can see insights for ' + fac + ' only. School-wide aggregates are hidden — ask your school admin if you need broader access.</p>'
          + '</div>';
        if (!ins.by_faculty || ins.by_faculty.length === 0) {
          html += '<div class="section"><p class="section-text" style="color:#9ca3af">No tasks with class-level feedback exist yet in the faculties you have access to.</p></div>';
        }
      }

      if (ins.school_snapshot) {
        html += '<div class="section snapshot"><div class="section-title"><span class="section-dot"></span>School snapshot</div>';
        html += '<p class="section-text">' + e(ins.school_snapshot) + '</p></div>';
      }
      if (ins.school_strengths && ins.school_strengths.length) {
        html += '<div class="section strengths"><div class="section-title"><span class="section-dot"></span>What\'s working across the school</div>';
        html += '<ul class="feedback-list">';
        ins.school_strengths.forEach(p => { html += '<li>' + e(p) + '</li>'; });
        html += '</ul></div>';
      }
      if (ins.school_weaknesses && ins.school_weaknesses.length) {
        html += '<div class="section weaknesses"><div class="section-title"><span class="section-dot"></span>Common gaps across the school</div>';
        html += '<ul class="feedback-list">';
        ins.school_weaknesses.forEach(p => { html += '<li>' + e(p) + '</li>'; });
        html += '</ul></div>';
      }
      if (ins.verb_depth_patterns) {
        html += '<div class="section verb-adherence"><div class="section-title"><span class="section-dot"></span>NESA verb-depth patterns</div>';
        html += '<p class="section-text">' + e(ins.verb_depth_patterns) + '</p></div>';
      }
      if (ins.by_faculty && ins.by_faculty.length) {
        html += '<div class="section"><div class="section-title" style="color:#374151"><span class="section-dot" style="background:#ed7615"></span>By faculty</div>';
        html += '<div class="faculty-grid">';
        ins.by_faculty.forEach(f => {
          html += '<div class="faculty-card">';
          html += '<h4>' + e(f.faculty || 'Unknown') + '<span class="task-count">' + (f.task_count || 0) + ' task' + (f.task_count === 1 ? '' : 's') + '</span></h4>';
          if (f.notable_pattern) html += '<div class="notable">' + e(f.notable_pattern) + '</div>';
          if (f.strengths && f.strengths.length) {
            html += '<div class="faculty-subhead">Strengths</div><ul>';
            f.strengths.forEach(s => { html += '<li>' + e(s) + '</li>'; });
            html += '</ul>';
          }
          if (f.weaknesses && f.weaknesses.length) {
            html += '<div class="faculty-subhead">Gaps</div><ul>';
            f.weaknesses.forEach(w => { html += '<li>' + e(w) + '</li>'; });
            html += '</ul>';
          }
          html += '</div>';
        });
        html += '</div></div>';
      }
      if (ins.teachable_moments && ins.teachable_moments.length) {
        html += '<div class="section priorities"><div class="section-title"><span class="section-dot"></span>Teachable moments for leadership</div>';
        html += '<ul class="feedback-list">';
        ins.teachable_moments.forEach(p => { html += '<li>' + e(p) + '</li>'; });
        html += '</ul></div>';
      }
      return html;
    }

    async function generate() {
      const btn = document.getElementById('generateBtn');
      if (btn) btn.disabled = true;
      const overlay = document.getElementById('synthesisLoading');
      const body = document.getElementById('synthesisBody');
      if (body) body.style.display = 'none';
      if (overlay) overlay.classList.add('visible');

      var msgs = [
        'Reading class-level feedback across the school...',
        'Grouping tasks by faculty...',
        'Looking for cross-faculty patterns...',
        'Checking NESA verb-depth handling...',
        'Identifying common strengths...',
        'Identifying recurring gaps...',
        'Surfacing teachable moments for leadership...',
        'Drafting the school snapshot...',
        'Tightening wording so it\'s leadership-actionable...',
        'Almost there...'
      ];
      let mi = 0;
      const loadingInterval = setInterval(() => {
        mi = (mi + 1) % msgs.length;
        const el = document.getElementById('loadingText');
        if (el) el.textContent = msgs[mi];
      }, 5000);

      try {
        const body = SCHOOL_ID_OVERRIDE ? { school_id: SCHOOL_ID_OVERRIDE } : {};
        const res = await authFetch('/api/insights-synthesis', { method: 'POST', body: JSON.stringify(body) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to generate insights.');
        currentData = data;
        clearInterval(loadingInterval);
        render();
      } catch (err) {
        clearInterval(loadingInterval);
        if (overlay) overlay.classList.remove('visible');
        if (body) body.style.display = '';
        if (btn) btn.disabled = false;
        alert(err.message);
      }
    }

    // ─────────────── Card renderers ───────────────

    function renderCardsGrid(cards, synth) {
      if (!cards || !cards.cards) return '';
      const cd = cards.cards;
      let html = '<div class="cards-grid">';

      // Activity sparkline — full width
      html += '<div class="card card-span-12">'
        + cardHeader('Activity', 'Submissions per week, last 12 weeks')
        + renderActivityCard(cd.activity)
        + '</div>';

      // Engagement (faculty or classes) — 7 cols
      const engagementLabel = (cd.engagement && cd.engagement.mode === 'classes')
        ? 'Class engagement — ' + (cd.engagement.faculty || '')
        : 'Faculty engagement';
      html += '<div class="card card-span-7">'
        + cardHeader(engagementLabel, 'By submissions volume')
        + renderEngagementCard(cd.engagement)
        + '</div>';

      // Mark distribution (A-E) — 5 cols
      html += '<div class="card card-span-5">'
        + cardHeader('Mark distribution', 'NESA Common Grade Scale')
        + renderMarkDistribution(cd.mark_distribution)
        + '</div>';

      // Mark by faculty — full width (when shown)
      if (cd.mark_by_faculty) {
        html += '<div class="card card-span-12">'
          + cardHeader('Mark distribution by faculty', 'Common Grade Scale per KLA')
          + renderMarkByFaculty(cd.mark_by_faculty)
          + '</div>';
      }

      // Marking progress — 4 cols
      html += '<div class="card card-span-4">'
        + cardHeader('Marking progress', 'All submissions in scope')
        + renderMarkingProgress(cd.marking)
        + '</div>';

      // Teacher activity — 8 cols
      html += '<div class="card card-span-8">'
        + cardHeader('Teacher activity', 'Sorted by last activity')
        + renderTeacherActivity(cd.teacher_activity)
        + '</div>';

      // Per-criterion lows — 6 cols
      html += '<div class="card card-span-6">'
        + cardHeader('Lowest-scoring criteria', 'Where the cohort drops marks')
        + renderPerCriterion(cd.per_criterion_lows)
        + '</div>';

      // Improvement velocity — 6 cols
      html += '<div class="card card-span-6">'
        + cardHeader('Improvement velocity', 'Multi-draft students v1 → final')
        + renderImprovementVelocity(cd.improvement_velocity)
        + '</div>';

      // Keyword struggles — full width
      html += '<div class="card card-span-12">'
        + cardHeader('Keyword struggles', 'NESA terms most often flagged for improvement')
        + renderKeywordStruggles(cd.keyword_struggles)
        + '</div>';

      // ─── Tier A: LLM-derived cards (each with own Generate button) ───
      const llm = cd.llm || {};

      html += '<div class="card card-span-6">' + renderLLMCard('bottom_decile', llm.bottom_decile, {
        title: 'Top 3 mistakes — bottom decile',
        sub: 'AI synthesis of patterns in the bottom 10% of students',
        emptyTeaser: 'Generate this card to surface the 3 dominant mistakes appearing across the bottom 10% of marked submissions. Drives intervention priorities.',
        render: renderBottomDecile,
      }) + '</div>';

      html += '<div class="card card-span-6">' + renderLLMCard('top_decile', llm.top_decile, {
        title: 'Stretch goals — top decile',
        sub: '3 highest-impact next steps for top 10% students',
        emptyTeaser: 'Generate this card to identify the 3 most useful next steps for the top 10% of students — moving "high" responses to "exceptional".',
        render: renderTopDecile,
      }) + '</div>';

      html += '<div class="card card-span-12">' + renderLLMCard('verb_depth', llm.verb_depth, {
        title: 'NESA verb-depth handling',
        sub: 'How students execute each directive verb across faculties',
        emptyTeaser: 'Generate to map how students across the school are handling each NESA directive verb (analyse, evaluate, justify, etc.). Most actionable HSC diagnostic — drives whole-faculty PD priorities.',
        render: renderVerbDepth,
      }) + '</div>';

      html += '<div class="card card-span-6">' + renderLLMCard('common_gaps', llm.common_gaps, {
        title: 'Top 5 cohort-wide gaps',
        sub: 'Recurring improvement themes across all students',
        emptyTeaser: 'Generate to surface the 5 gaps appearing most often in AI feedback across the cohort. Drives whole-staff PD planning.',
        render: renderListedItems,
      }) + '</div>';

      html += '<div class="card card-span-6">' + renderLLMCard('things_done_well', llm.things_done_well, {
        title: 'Top 3 things done well',
        sub: 'Strengths showing up consistently across the cohort',
        emptyTeaser: 'Generate to identify the 3 strengths students across the school are consistently demonstrating. Useful for celebrating wins and sharing best practice.',
        render: renderListedItems,
      }) + '</div>';

      // Cross-faculty synthesis (LLM) — full width
      html += '<div class="card card-span-12">'
        + renderSynthesisCard(cards, synth)
        + '</div>';

      html += '</div>';
      return html;
    }

    // ─────────────── LLM card renderers ───────────────

    function filtersMatch(a, b) {
      const keys = ['faculty', 'course', 'class_id', 'year_level'];
      for (const k of keys) {
        const av = (a && a[k]) ? String(a[k]) : '';
        const bv = (b && b[k]) ? String(b[k]) : '';
        if (av !== bv) return false;
      }
      return true;
    }

    function renderLLMCard(kind, cache, opts) {
      const hasContent = !!(cache && cache.content);
      const lastGen = cache && cache.generated_at
        ? new Date(cache.generated_at).toLocaleString('en-AU', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
        : null;
      const mismatch = hasContent && !filtersMatch(cache.filters || {}, activeFilters);

      let html = '<div class="synthesis-head">';
      html += '<div><h3 style="font-size:14.5px">' + e(opts.title) + '</h3>';
      html += '<div class="meta" style="font-size:11.5px;color:#9ca3af;margin-top:2px">' + e(opts.sub) + '</div>';
      if (hasContent) {
        const ctx = [];
        if (cache.source_submission_count) ctx.push(cache.source_submission_count + ' submissions');
        if (lastGen) ctx.push('updated ' + lastGen);
        const filtersStr = formatFilterContext(cache.filters);
        if (filtersStr) ctx.push('scope: ' + filtersStr);
        html += '<div class="meta" style="margin-top:4px">' + e(ctx.join(' · ')) + '</div>';
      }
      html += '</div>';
      html += '<button class="btn-synthesise" style="padding:6px 12px;font-size:12px" data-llm-generate="' + e(kind) + '">'
        + (hasContent ? 'Regenerate' : 'Generate') + '</button>';
      html += '</div>';

      if (mismatch) {
        html += '<div style="margin-bottom:10px;padding:8px 12px;background:#fef3c7;border:1px solid #fde68a;border-radius:6px;font-size:12px;color:#78350f;line-height:1.45">'
          + '<strong>Stale scope.</strong> This card was generated with different filters than the ones currently selected. Click <strong>Regenerate</strong> to refresh under your current filters.'
          + '</div>';
      }

      html += '<div class="synthesis-loading" id="llmLoading_' + e(kind) + '"><div class="spinner"></div><div style="font-size:13px;color:#6b7280">Analysing feedback across submissions...</div></div>';

      html += '<div id="llmBody_' + e(kind) + '" style="font-size:13.5px;color:#374151;line-height:1.55">';
      if (hasContent) {
        html += opts.render(cache.content);
      } else {
        html += '<div class="card-empty" style="padding:20px"><strong>Not generated yet</strong>' + e(opts.emptyTeaser) + '</div>';
      }
      html += '</div>';
      return html;
    }

    function formatFilterContext(f) {
      if (!f) return '';
      const parts = [];
      if (f.year_level) parts.push('Year ' + f.year_level);
      if (f.faculty) parts.push(f.faculty);
      if (f.course) parts.push(f.course);
      if (f.class_id) parts.push('class');
      return parts.join(' · ');
    }

    function renderBottomDecile(c) {
      let html = '';
      if (c.scope_note) html += '<div style="font-size:12px;color:#9ca3af;margin-bottom:10px">' + e(c.scope_note) + '</div>';
      html += '<ol style="padding-left:18px;display:flex;flex-direction:column;gap:10px">';
      (c.patterns || []).forEach(p => {
        html += '<li style="background:#fffbeb;padding:10px 12px;border-radius:8px;border-left:3px solid #d97706">'
          + '<div style="font-weight:700;color:#78350f;margin-bottom:3px">' + e(p.headline) + '</div>'
          + '<div style="font-size:12.5px;color:#374151;margin-bottom:4px">' + e(p.detail) + '</div>'
          + '<div style="font-size:11px;color:#9ca3af;font-style:italic">' + e(p.prevalence_note || '') + '</div>'
          + '</li>';
      });
      html += '</ol>';
      return html;
    }

    function renderTopDecile(c) {
      let html = '';
      if (c.scope_note) html += '<div style="font-size:12px;color:#9ca3af;margin-bottom:10px">' + e(c.scope_note) + '</div>';
      html += '<ol style="padding-left:18px;display:flex;flex-direction:column;gap:10px">';
      (c.next_steps || []).forEach(p => {
        html += '<li style="background:#f0fdf4;padding:10px 12px;border-radius:8px;border-left:3px solid #15803d">'
          + '<div style="font-weight:700;color:#14532d;margin-bottom:3px">' + e(p.headline) + '</div>'
          + '<div style="font-size:12.5px;color:#374151">' + e(p.detail) + '</div>'
          + '</li>';
      });
      html += '</ol>';
      return html;
    }

    function renderVerbDepth(c) {
      let html = '';
      if (c.overall_pattern) html += '<div style="font-size:13px;color:#374151;background:#fdf6ee;padding:10px 12px;border-radius:8px;margin-bottom:14px;line-height:1.55"><strong style="color:#b45309">Overall: </strong>' + e(c.overall_pattern) + '</div>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));gap:10px">';
      (c.verbs || []).forEach(v => {
        const sevColour = v.severity === 'concern' ? '#991b1b' : v.severity === 'strength' ? '#15803d' : '#d97706';
        const sevBg     = v.severity === 'concern' ? '#fef2f2' : v.severity === 'strength' ? '#f0fdf4' : '#fffbeb';
        html += '<div style="background:' + sevBg + ';padding:11px 13px;border-radius:8px;border-left:3px solid ' + sevColour + '">'
          + '<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px">'
          +   '<span style="font-weight:800;font-size:15px;color:' + sevColour + '">' + e(v.verb) + '</span>'
          +   '<span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:' + sevColour + '">' + e(v.severity || '') + '</span>'
          + '</div>'
          + '<div style="font-size:12.5px;color:#374151;margin-bottom:6px">' + e(v.handling_note) + '</div>'
          + (v.faculties_involved && v.faculties_involved.length
              ? '<div style="font-size:11px;color:#9ca3af">' + e(v.faculties_involved.join(' · ')) + '</div>'
              : '')
          + '</div>';
      });
      html += '</div>';
      return html;
    }

    function renderListedItems(c) {
      const items = c.gaps || c.strengths || [];
      const isGap = !!c.gaps;
      const bg = isGap ? '#fffbeb' : '#f0fdf4';
      const stripe = isGap ? '#d97706' : '#15803d';
      const titleC = isGap ? '#78350f' : '#14532d';
      let html = '';
      if (c.scope_note) html += '<div style="font-size:12px;color:#9ca3af;margin-bottom:10px">' + e(c.scope_note) + '</div>';
      html += '<ol style="padding-left:18px;display:flex;flex-direction:column;gap:10px">';
      items.forEach(p => {
        html += '<li style="background:' + bg + ';padding:10px 12px;border-radius:8px;border-left:3px solid ' + stripe + '">'
          + '<div style="font-weight:700;color:' + titleC + ';margin-bottom:3px">' + e(p.headline) + '</div>'
          + '<div style="font-size:12.5px;color:#374151;margin-bottom:4px">' + e(p.detail) + '</div>'
          + (p.faculties_involved && p.faculties_involved.length
              ? '<div style="font-size:11px;color:#9ca3af">' + e(p.faculties_involved.join(' · ')) + '</div>'
              : '')
          + '</li>';
      });
      html += '</ol>';
      return html;
    }

    async function generateLLMCard(kind) {
      const btn = document.querySelector('[data-llm-generate="' + kind + '"]');
      const loading = document.getElementById('llmLoading_' + kind);
      const body = document.getElementById('llmBody_' + kind);
      if (btn) btn.disabled = true;
      if (body) body.style.display = 'none';
      if (loading) loading.classList.add('visible');
      try {
        const filterBody = { kind, school_id: SCHOOL_ID_OVERRIDE || undefined };
        FILTER_KEYS.forEach(k => { if (activeFilters[k]) filterBody[k] = activeFilters[k]; });
        const res = await authFetch('/api/insights-card-generate', { method: 'POST', body: JSON.stringify(filterBody) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to generate');
        // Reload all cards (simpler than patching the DOM)
        await reloadData();
      } catch (err) {
        if (loading) loading.classList.remove('visible');
        if (body) body.style.display = '';
        if (btn) btn.disabled = false;
        alert(err.message);
      }
    }

    function renderPerCriterion(d) {
      const rows = (d && d.rows) || [];
      if (rows.length === 0) {
        return '<div class="card-empty"><strong>No graded criteria yet</strong>Once teachers mark submissions with criterion-level rubrics, the criteria where the cohort scores lowest appear here.</div>';
      }
      let html = '<div style="font-size:12.5px;color:#6b7280;margin-bottom:10px">Across <strong>' + (d.total_analyzed || 0) + '</strong> graded submission' + (d.total_analyzed === 1 ? '' : 's') + ', sorted lowest first.</div>';
      const max = 100;
      html += '<div class="bar-list">';
      rows.forEach(r => {
        const pct = Math.max(0, Math.min(100, r.avg_pct));
        const colour = pct < 50 ? '#991b1b' : pct < 65 ? '#b45309' : pct < 75 ? '#d97706' : '#15803d';
        html += '<div class="bar-row">'
          + '<div class="bar-label" title="' + e(r.name) + '">' + e(r.name) + '<div class="bar-meta">' + r.sample_size + ' sample' + (r.sample_size === 1 ? '' : 's') + '</div></div>'
          + '<div class="bar-track"><div class="bar-fill" style="width:' + pct.toFixed(1) + '%;background:linear-gradient(90deg, ' + colour + ', ' + colour + ')"></div></div>'
          + '<div class="bar-value">' + pct.toFixed(0) + '%</div>'
          + '</div>';
      });
      html += '</div>';
      return html;
    }

    function renderImprovementVelocity(d) {
      const sample = (d && d.sample_size) || 0;
      if (sample === 0) {
        return '<div class="card-empty"><strong>No multi-draft data yet</strong>Once students submit more than one draft on the same task, this card quantifies how much their AI feedback improves between v1 and the final draft.</div>';
      }
      const delta = d.avg_delta_pct || 0;
      const colour = delta >= 25 ? '#15803d' : delta >= 10 ? '#d97706' : '#991b1b';
      let html = '<div style="display:flex;flex-direction:column;gap:8px">';
      html += '<div><span style="font-size:30px;font-weight:800;color:' + colour + ';letter-spacing:-0.5px">'
        + (delta > 0 ? '−' : delta < 0 ? '+' : '') + Math.abs(delta).toFixed(0) + '%'
        + '</span><span style="font-size:13px;color:#6b7280;margin-left:8px">improvement points between v1 → final</span></div>';
      html += '<div style="font-size:12.5px;color:#374151;line-height:1.55">'
        + 'Sample: <strong>' + sample + '</strong> student–task pair' + (sample === 1 ? '' : 's') + ' with 2+ drafts. '
        + 'Average <strong>' + (d.avg_v1 || 0).toFixed(1) + '</strong> improvement points in v1, '
        + '<strong>' + (d.avg_vN || 0).toFixed(1) + '</strong> in the final draft.'
        + '</div>';
      const total = sample;
      const pct = n => total > 0 ? (n / total) * 100 : 0;
      html += '<div class="marking-stack" style="height:18px">';
      if (d.decreased > 0) html += '<div class="marking-seg marked" style="flex:' + pct(d.decreased) + '" title="' + d.decreased + ' improved">' + (pct(d.decreased) >= 14 ? d.decreased : '') + '</div>';
      if (d.unchanged > 0) html += '<div class="marking-seg" style="flex:' + pct(d.unchanged) + ';background:#9ca3af" title="' + d.unchanged + ' unchanged">' + (pct(d.unchanged) >= 14 ? d.unchanged : '') + '</div>';
      if (d.increased > 0) html += '<div class="marking-seg" style="flex:' + pct(d.increased) + ';background:#991b1b" title="' + d.increased + ' regressed">' + (pct(d.increased) >= 14 ? d.increased : '') + '</div>';
      html += '</div>';
      html += '<div style="display:flex;gap:14px;font-size:11.5px;color:#6b7280">'
        + '<span><span class="marking-legend-dot marked" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#15803d;margin-right:4px"></span><strong style="color:#111827">' + d.decreased + '</strong> improved</span>'
        + '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#9ca3af;margin-right:4px"></span><strong style="color:#111827">' + d.unchanged + '</strong> unchanged</span>'
        + '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#991b1b;margin-right:4px"></span><strong style="color:#111827">' + d.increased + '</strong> regressed</span>'
        + '</div>';
      html += '</div>';
      return html;
    }

    function renderKeywordStruggles(d) {
      const rows = (d && d.rows) || [];
      if (rows.length === 0) {
        return '<div class="card-empty"><strong>No keyword data yet</strong>Once students receive AI feedback, the NESA terms most often flagged for improvement appear here ranked by frequency.</div>';
      }
      let html = '<div style="font-size:12.5px;color:#6b7280;margin-bottom:10px">Across <strong>' + (d.total_analyzed || 0) + '</strong> submission' + (d.total_analyzed === 1 ? '' : 's') + ' with AI feedback. % = share of submissions where the term was flagged.</div>';
      const max = Math.max(1, ...rows.map(r => r.count));
      // Lay out as a two-column grid of bars so we fit ~10 keywords cleanly.
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));gap:8px">';
      rows.forEach(r => {
        const pct = (r.count / max) * 100;
        html += '<div class="bar-row" style="grid-template-columns:120px 1fr auto">'
          + '<div class="bar-label" style="text-transform:lowercase">' + e(r.keyword) + '</div>'
          + '<div class="bar-track"><div class="bar-fill" style="width:' + pct.toFixed(1) + '%"></div></div>'
          + '<div class="bar-value">' + r.count + '<span style="color:#9ca3af;font-weight:500;font-size:11px;margin-left:4px">(' + r.pct.toFixed(0) + '%)</span></div>'
          + '</div>';
      });
      html += '</div>';
      return html;
    }

    function cardHeader(title, sub) {
      let h = '<div class="card-h"><span>' + e(title) + '</span>';
      if (sub) h += '<span class="card-h-sub">' + e(sub) + '</span>';
      h += '</div>';
      return h;
    }

    function renderActivityCard(activity) {
      if (!activity || !activity.weeks || activity.weeks.length === 0) {
        return '<div class="card-empty"><strong>No submissions yet</strong>Activity will appear here once students start submitting drafts.</div>';
      }
      const weeks = activity.weeks;
      const total = activity.total_in_window || 0;
      const maxCount = Math.max(1, ...weeks.map(w => w.count));
      const W = 100, H = 60;
      const stepX = weeks.length > 1 ? (W / (weeks.length - 1)) : 0;
      const points = weeks.map((w, i) => ({
        x: i * stepX,
        y: H - (w.count / maxCount) * H,
        count: w.count,
        week_start: w.week_start,
      }));
      const linePath = 'M ' + points.map(p => p.x.toFixed(2) + ',' + p.y.toFixed(2)).join(' L ');
      const areaPath = linePath + ' L ' + W.toFixed(2) + ',' + H.toFixed(2) + ' L 0,' + H.toFixed(2) + ' Z';
      const firstLabel = new Date(weeks[0].week_start).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
      const lastLabel = new Date(weeks[weeks.length - 1].week_start).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
      let html = '<div class="sparkline-summary"><strong>' + total + '</strong>submission' + (total === 1 ? '' : 's') + ' in the last 12 weeks</div>';
      html += '<svg class="sparkline" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">';
      html += '<path class="area" d="' + areaPath + '"/>';
      html += '<path class="line" d="' + linePath + '"/>';
      points.forEach(p => {
        html += '<circle class="dot" cx="' + p.x.toFixed(2) + '" cy="' + p.y.toFixed(2) + '" r="1.4"><title>' + new Date(p.week_start).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }) + ': ' + p.count + '</title></circle>';
      });
      html += '</svg>';
      html += '<div class="sparkline-axis"><span>' + e(firstLabel) + '</span><span>' + e(lastLabel) + '</span></div>';
      return html;
    }

    function renderEngagementCard(engagement) {
      if (!engagement || !engagement.rows || engagement.rows.length === 0) {
        return '<div class="card-empty"><strong>No published tasks yet</strong>Bars appear here once teachers publish tasks in their classes.</div>';
      }
      const rows = engagement.rows;
      const max = Math.max(1, ...rows.map(r => r.submission_count || 0));
      let html = '<div class="bar-list">';
      rows.forEach(r => {
        const sub = r.submission_count || 0;
        const pct = (sub / max) * 100;
        const label = engagement.mode === 'classes' ? r.name : r.faculty;
        const meta = engagement.mode === 'classes'
          ? (r.teacher_name || '') + ' · ' + (r.task_count || 0) + ' task' + (r.task_count === 1 ? '' : 's')
          : (r.teacher_count || 0) + ' staff · ' + (r.task_count || 0) + ' task' + (r.task_count === 1 ? '' : 's');
        // Drill-down only on faculty mode (class mode has nothing extra to drill into).
        const drill = engagement.mode === 'faculty'
          ? ' clickable" data-drill-faculty="' + e(r.faculty)
          : '';
        html += '<div class="bar-row' + drill + '" title="' + (engagement.mode === 'faculty' ? 'Click to see teachers in this faculty' : e(label)) + '">'
          + '<div class="bar-label">' + e(label) + '<div class="bar-meta">' + e(meta) + '</div></div>'
          + '<div class="bar-track"><div class="bar-fill" style="width:' + pct.toFixed(1) + '%"></div></div>'
          + '<div class="bar-value">' + sub + '</div>'
          + '</div>';
      });
      html += '</div>';
      return html;
    }

    function renderMarkDistribution(dist) {
      if (!dist || !dist.total) {
        return '<div class="card-empty"><strong>No marks awarded yet</strong>This bucket shows the NESA Common Grade Scale spread across all marked submissions.</div>';
      }
      const counts = dist.counts || {};
      const total = dist.total || 1;
      const bands = dist.bands || [{ code: 'A' }, { code: 'B' }, { code: 'C' }, { code: 'D' }, { code: 'E' }];
      let html = '<div class="band-list">';
      bands.forEach(b => {
        const n = counts[b.code] || 0;
        const pct = (n / total) * 100;
        const clickable = n > 0 ? ' clickable" data-drill-band="' + e(b.code) : '';
        html += '<div class="band-row band-' + e(b.code) + clickable + '" title="' + (n > 0 ? 'Click to see submissions in this band' : 'No submissions') + '">'
          + '<div class="band-letter">' + e(b.code) + '</div>'
          + '<div class="band-label">' + e(b.label || b.code) + '</div>'
          + '<div class="band-track"><div class="band-fill" style="width:' + Math.max(pct, n > 0 ? 1.5 : 0).toFixed(1) + '%"></div></div>'
          + '<div class="band-value">' + n + ' <span style="color:#9ca3af;font-weight:500;font-size:11px">(' + pct.toFixed(0) + '%)</span></div>'
          + '</div>';
      });
      html += '</div>';
      return html;
    }

    function renderMarkByFaculty(byFaculty) {
      const rows = (byFaculty && byFaculty.rows) || [];
      const bands = (byFaculty && byFaculty.bands) || [{ code: 'A' }, { code: 'B' }, { code: 'C' }, { code: 'D' }, { code: 'E' }];
      if (rows.length === 0) {
        return '<div class="card-empty"><strong>No marks per faculty yet</strong>Each faculty\'s grade-scale spread shows here once submissions are graded.</div>';
      }
      let html = '<div class="mark-faculty-grid">';
      rows.forEach(r => {
        const total = r.total || 1;
        html += '<div class="mark-faculty-card">';
        html += '<h5>' + e(r.faculty) + '<span class="count">' + r.total + ' marked</span></h5>';
        html += '<div class="mini-bands">';
        bands.forEach(b => {
          const n = (r.counts && r.counts[b.code]) || 0;
          const pct = (n / total) * 100;
          if (n > 0) html += '<div class="mini-band band-' + e(b.code) + '" style="flex:' + pct + '" title="' + e(b.code) + ': ' + n + '">' + (pct >= 9 ? e(b.code) : '') + '</div>';
        });
        html += '</div>';
        html += '</div>';
      });
      html += '</div>';
      return html;
    }

    function renderMarkingProgress(marking) {
      const total = (marking && marking.total) || 0;
      if (total === 0) {
        return '<div class="card-empty"><strong>No submissions yet</strong>Marking progress appears once students submit drafts.</div>';
      }
      const m = marking.marked || 0;
      const a = marking.awaiting_marking || 0;
      const u = marking.unmarked || 0;
      const pct = n => total > 0 ? (n / total) * 100 : 0;
      let html = '<div class="marking-stack">';
      if (m > 0) html += '<div class="marking-seg marked clickable" data-drill-marking="marked" style="flex:' + pct(m) + '" title="Marked — click to list">' + (pct(m) >= 12 ? m : '') + '</div>';
      if (a > 0) html += '<div class="marking-seg awaiting clickable" data-drill-marking="awaiting" style="flex:' + pct(a) + '" title="Awaiting marking — click to list">' + (pct(a) >= 12 ? a : '') + '</div>';
      if (u > 0) html += '<div class="marking-seg unmarked clickable" data-drill-marking="unmarked" style="flex:' + pct(u) + '" title="Unmarked — click to list">' + (pct(u) >= 12 ? u : '') + '</div>';
      html += '</div>';
      html += '<div class="marking-legend">';
      html += '<div class="marking-legend-item"><span class="marking-legend-dot marked"></span><strong>' + m + '</strong> marked</div>';
      html += '<div class="marking-legend-item"><span class="marking-legend-dot awaiting"></span><strong>' + a + '</strong> awaiting</div>';
      html += '<div class="marking-legend-item"><span class="marking-legend-dot unmarked"></span><strong>' + u + '</strong> unmarked</div>';
      html += '</div>';
      return html;
    }

    function renderTeacherActivity(rows) {
      if (!rows || rows.length === 0) {
        return '<div class="card-empty"><strong>No staff in scope yet</strong>Once teachers sign up with a matching school email domain, they appear here.</div>';
      }
      const now = Date.now();
      const ms30d = 30 * 24 * 60 * 60 * 1000;
      let html = '<table class="teachers-table"><thead><tr><th>Teacher</th><th style="text-align:right">Classes</th><th style="text-align:right">Tasks</th><th style="text-align:right">Last 30d</th><th>Last active</th></tr></thead><tbody>';
      rows.forEach(r => {
        let pill = '';
        let trClass = '';
        if (!r.last_active) {
          pill = '<span class="stale-pill never-pill">never</span>';
          trClass = 'stale';
        } else {
          const age = now - new Date(r.last_active).getTime();
          if (age > ms30d) {
            pill = '<span class="stale-pill">' + Math.floor(age / (24 * 60 * 60 * 1000)) + 'd ago</span>';
            trClass = 'stale';
          } else if (age < 7 * 24 * 60 * 60 * 1000) {
            pill = '<span class="stale-pill active-pill">active</span>';
          }
        }
        const last = r.last_active
          ? new Date(r.last_active).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' })
          : '—';
        html += '<tr class="clickable ' + trClass + '" data-drill-teacher="' + e(r.teacher_id) + '" data-teacher-name="' + e(r.name) + '">';
        html += '<td>' + e(r.name) + pill + '</td>';
        html += '<td style="text-align:right">' + r.class_count + '</td>';
        html += '<td style="text-align:right">' + r.task_count + '</td>';
        html += '<td style="text-align:right">' + r.tasks_last_30d + '</td>';
        html += '<td>' + e(last) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      return html;
    }

    function renderSynthesisCard(cards, synth) {
      const counts = (cards && cards.counts) || {};
      const tasksWithFb = counts.tasks_with_class_feedback || 0;
      const hasInsights = !!(synth && synth.insights);
      const canGenerate = tasksWithFb > 0;
      const lastGen = synth && synth.generated_at
        ? new Date(synth.generated_at).toLocaleString('en-AU', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
        : null;

      let html = '<div class="synthesis-head">';
      html += '<div><h3>Cross-faculty synthesis</h3>';
      if (hasInsights) {
        html += '<div class="meta">Based on ' + (synth.task_count || 0) + ' task' + (synth.task_count === 1 ? '' : 's') + ' with class-level feedback' + (lastGen ? ' · Last generated ' + e(lastGen) : '') + '</div>';
      } else if (canGenerate) {
        html += '<div class="meta">Roll up class-level feedback from ' + tasksWithFb + ' task' + (tasksWithFb === 1 ? '' : 's') + ' into a school-level overview. Takes 30 to 60 seconds.</div>';
      } else {
        html += '<div class="meta">Available once teachers generate class-level feedback on at least one task.</div>';
      }
      html += '</div>';
      if (canGenerate) {
        html += '<button class="btn-synthesise" id="generateBtn">' + (hasInsights ? 'Regenerate' : 'Generate insights') + '</button>';
      }
      html += '</div>';

      html += '<div class="synthesis-loading" id="synthesisLoading"><div class="spinner"></div><div class="loading-text" id="loadingText">Reading class-level feedback...</div></div>';

      html += '<div id="synthesisBody">';
      if (hasInsights) {
        html += renderInsights(synth.insights);
      } else if (!canGenerate) {
        html += '<div class="card-empty" style="padding:24px"><strong>No synthesis yet</strong>Ask teachers to open a task and click "Generate class feedback" — once any task has feedback, this card lets you roll it up across the school.</div>';
      } else {
        html += '<div class="card-empty" style="padding:24px"><strong>Ready to synthesise</strong>Click "Generate insights" to produce the cross-faculty rollup.</div>';
      }
      html += '</div>';

      return html;
    }
  </script>
</body>
</html>
