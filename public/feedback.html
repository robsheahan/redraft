        const isCorrect = correctId && o.id === correctId;
        let cls = 'mc-opt';
        if (isCorrect) cls += ' mc-correct';
        if (isSel && correctId && !isCorrect) cls += ' mc-wrong';
        html += '<div class="' + cls + '"><span class="mc-bullet">' + (isSel ? '●' : '○') + '</span> ' + e(o.text);
        if (isCorrect) html += ' <span class="mc-tag mc-tag-correct">correct</span>';
        if (isSel) html += ' <span class="mc-tag mc-tag-chose">your answer</span>';
        html += '</div>';
      });
      if (!a.selected_option_id) html += '<div class="mc-noanswer">You did not answer this question.</div>';
      html += '</div>';
      return html;
    }

    function renderTeacherAnnotatedDraftHtml(draftText, anns) {
      const sorted = anns.slice().sort(function(a, b) { return (a.start || 0) - (b.start || 0); });
      let html = '';
      let cursor = 0;
      for (let i = 0; i < sorted.length; i++) {
        const a = sorted[i];
        if (typeof a.start !== 'number' || typeof a.end !== 'number' || a.start < cursor || a.end > draftText.length) continue;
        html += e(draftText.slice(cursor, a.start));
        html += '<span class="annotation annotation--teacher-' + e(a.category || 'note') + '" data-teacher-idx="' + i + '" onclick="focusTeacherAnnotation(' + i + ')" tabindex="0">';
        html += e(draftText.slice(a.start, a.end));
        html += '<sup class="annotation-num">' + (i + 1) + '</sup>';
        html += '</span>';
        cursor = a.end;
      }
      html += e(draftText.slice(cursor));
      return html;
    }

    function renderTeacherAnnotationCardsHtml(anns) {
      return anns.map(function(a, i) {
        return '<div class="annotation-card annotation-card--teacher-' + e(a.category || 'note') + '" id="teacher-ann-card-' + i + '" onclick="focusTeacherAnnotation(' + i + ')">'
          + '<div class="annotation-quote">"' + e(a.quote) + '"</div>'
          + '<div class="annotation-comment">' + e(a.comment) + '</div>'
          + '</div>';
      }).join('');
    }

    function focusTeacherAnnotation(idx) {
      document.querySelectorAll('.annotation.focused, .annotation-card.focused').forEach(function(el) {
        el.classList.remove('focused');
      });
      var hl = document.querySelector('[data-teacher-idx="' + idx + '"]');
      var card = document.getElementById('teacher-ann-card-' + idx);
      if (hl) hl.classList.add('focused');
      if (card) {
        card.classList.add('focused');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }
    window.focusTeacherAnnotation = focusTeacherAnnotation;

    function renderAnnotatedDraftHtml(draftText, annotations) {
      // Server guarantees annotations are sorted by start and non-overlapping.
      var html = '';
      var cursor = 0;
      for (var i = 0; i < annotations.length; i++) {
        var a = annotations[i];
        // Defensive: skip any annotation whose positions look invalid relative to draft
        if (typeof a.start !== 'number' || typeof a.end !== 'number' || a.start < cursor || a.end > draftText.length) continue;
        html += e(draftText.slice(cursor, a.start));
        html += '<span class="annotation annotation--' + e(a.category) + '" data-idx="' + i + '" onclick="focusAnnotation(' + i + ')" tabindex="0">';
        html += e(draftText.slice(a.start, a.end));
        html += '<sup class="annotation-num">' + (i + 1) + '</sup>';
        html += '</span>';
        cursor = a.end;
      }
      html += e(draftText.slice(cursor));
      return html;
    }

    function renderAnnotationCardsHtml(annotations) {
      return annotations.map(function(a, i) {
        var label = CATEGORY_LABELS[a.category] || a.category;
        return '<div class="annotation-card annotation-card--' + e(a.category) + '" id="ann-card-' + i + '" onclick="focusAnnotation(' + i + ')">'
          + '<div class="annotation-card-header">'
          + '<span class="annotation-num-badge">' + (i + 1) + '</span>'
          + '<span class="annotation-category">' + e(label) + '</span>'
          + '</div>'
          + '<div class="annotation-quote">"' + e(a.quote) + '"</div>'
          + '<div class="annotation-comment">' + e(a.comment) + '</div>'
          + '</div>';
      }).join('');
    }

    function switchView(view) {
      activeView = view;
      window._userPickedView = true;
      var feedbackView = document.getElementById('view-feedback');
      var annotatedView = document.getElementById('view-annotated');
      var teacherView = document.getElementById('view-teacher');
      if (feedbackView)  feedbackView.hidden  = (view !== 'feedback');
      if (annotatedView) annotatedView.hidden = (view !== 'annotated');
      if (teacherView)   teacherView.hidden   = (view !== 'teacher');
      document.querySelectorAll('.view-tab').forEach(function(t) {
        t.classList.toggle('active', t.getAttribute('data-view') === view);
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function focusAnnotation(idx) {
      document.querySelectorAll('.annotation.focused, .annotation-card.focused').forEach(function(el) {
        el.classList.remove('focused');
      });
      var highlight = document.querySelector('.annotation[data-idx="' + idx + '"]');
      var card = document.getElementById('ann-card-' + idx);
      if (highlight) highlight.classList.add('focused');
      if (card) {
        card.classList.add('focused');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
      if (highlight) {
        highlight.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    function switchDraft(version) {
      if (!allDrafts) return;
      var draft = allDrafts.find(function(d) { return d.draft_version === version; });
      if (!draft) return;
      // Build a meta object for this draft (keep the same question/course from currentMeta)
      var meta = Object.assign({}, currentMeta, { draftVersion: version });
      renderFeedback(draft.feedback, meta, allDrafts, version, draft.draft_text || '');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Submit the work currently in view for marking. Locks the task (no more
    // feedback) — mirrors submit.html's "Submit for marking", but for work the
    // student has already written, straight from the feedback page. Handles both
    // single-question essays (draft text) and multi-question take-homes (answers).
    async function submitForMarking(taskId) {
      if (!taskId) return;
      var isMulti = mqIsMulti || Array.isArray(currentSubmitAnswers);
      var body;
      if (isMulti) {
        // Read the (possibly edited) live answers.
        var answers = readMqAnswers();
        var answered = answers.filter(function(a) {
          return a && ((typeof a.text === 'string' && a.text.trim()) || a.selected_option_id);
        });
        if (answered.length === 0) {
          alert('Answer at least one question before submitting for marking.');
          return;
        }
        body = { task_id: taskId, answers: answers };
      } else {
        // Prefer the (possibly edited) inline editor value over the original draft.
        var editEl = document.getElementById('submitDocEdit');
        var draftText = ((editEl ? editEl.value : currentDraftText) || '').trim();
        if (draftText.length < 50) {
          alert('This draft looks too short to submit for marking. Click "Edit" to keep writing.');
          return;
        }
        body = { task_id: taskId, draft: draftText };
      }
      body.keystroke_count = fbTelemetry.keystroke_count;
      body.paste_attempts_blocked = fbTelemetry.paste_attempts_blocked;
      body.typing_session_count = fbTelemetry.typing_session_count;
      body.total_typing_time_ms = fbTelemetry.total_typing_time_ms;
      body.time_to_first_keystroke_ms = fbTelemetry.time_to_first_keystroke_ms;
      body.student_attachments = fbCurrentAttachments();
      if (!confirm('Submit this for marking?\n\nYour teacher will mark this version, and you won\'t be able to get any more feedback on this task.')) {
        return;
      }
      var btn = document.getElementById('submitMarkingBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }
      try {
        var res = await authFetch('/api/submit-for-marking', {
          method: 'POST',
          body: JSON.stringify(body)
        });
        var data = await res.json().catch(function() { return {}; });
        if (!res.ok) {
          alert(data.error || 'Could not submit for marking. Please try again in a moment.');
          if (btn) { btn.disabled = false; btn.textContent = 'Submit for marking'; }
          return;
        }
        // Success — replace the panel with a confirmation, in place, so the
        // student can keep reading their feedback.
        var panel = document.getElementById('submitPanel');
        if (panel) {
          panel.innerHTML = '<div class="submit-panel-success">✓ Submitted for marking</div>'
            + '<div class="submit-panel-sub" style="text-align:center;margin:6px 0 0">Your teacher will mark this version. You\'ll see your mark and comments in <a href="my-results.html" style="color:#ed7615;font-weight:600">My results</a>.</div>';
        } else {
          window.location.href = 'my-results.html';
        }
      } catch (err) {
        alert('Could not submit for marking. Please check your connection and try again.');
        if (btn) { btn.disabled = false; btn.textContent = 'Submit for marking'; }
      }
    }

    // Toggle the "what you'll submit" card between the read-only document view
    // and an editable textarea. In edit mode the editor carries keystroke
    // telemetry + paste blocking (parity with submit.html) and autosaves.
    function toggleEditDraft() {
      var view = document.getElementById('submitDocView');
      var edit = document.getElementById('submitDocEdit');
      var btn = document.getElementById('editDraftBtn');
      var label = document.getElementById('submitDocLabel');
      if (!view || !edit || !btn) return;
      var editing = (view.style.display === 'none');  // currently showing the textarea
      if (!editing) {
        view.style.display = 'none';
        edit.style.display = 'block';
        if (label) label.textContent = 'Editing your submission';
        btn.textContent = 'Done editing';
        if (fbEditorShownAt == null) fbEditorShownAt = Date.now();
        // Wire telemetry + paste/drop guards + autosave once.
        if (!edit.dataset.wired) {
          edit.dataset.wired = '1';
          var typedOnly = !currentTask || currentTask.typed_response_only !== false;
          edit.addEventListener('input', function() {
            var now = Date.now();
            if (fbTelemetry.time_to_first_keystroke_ms == null) {
              fbTelemetry.time_to_first_keystroke_ms = now - (fbEditorShownAt || now);
              fbTelemetry.typing_session_count = Math.max(1, fbTelemetry.typing_session_count);
            }
            fbTelemetry.keystroke_count += 1;
            if (fbLastInputAt) fbTelemetry.total_typing_time_ms += Math.min(now - fbLastInputAt, 5000);
            fbLastInputAt = now;
            // Keep the working draft in sync so navigating away and back (or a
            // re-render) preserves in-session edits, not just the saved snapshot.
            pendingAutosave = edit.value;
            updateSingleFeedbackAction();
            fbScheduleAutosave();
          });
          edit.addEventListener('paste', function(ev) {
            fbTelemetry.paste_attempts_blocked += 1;
            if (typedOnly) { ev.preventDefault(); showToast('Pasting is disabled for this task — please type your changes.'); }
          });
          edit.addEventListener('drop', function(ev) {
            fbTelemetry.paste_attempts_blocked += 1;
            if (typedOnly) { ev.preventDefault(); showToast('Dragging text in is disabled for this task.'); }
          });
          edit.addEventListener('dragover', function(ev) { if (typedOnly) ev.preventDefault(); });
          // Tab inserts a tab character rather than moving focus.
          edit.addEventListener('keydown', function(ev) {
            if (ev.key === 'Tab' && !ev.shiftKey) {
              ev.preventDefault();
              var s = edit.selectionStart, en = edit.selectionEnd;
              edit.value = edit.value.slice(0, s) + '\t' + edit.value.slice(en);
              edit.selectionStart = edit.selectionEnd = s + 1;
              edit.dispatchEvent(new Event('input', { bubbles: true }));
            }
          });
        }
        edit.focus();
        updateSingleFeedbackAction();
      } else {
        // Back to preview — regenerate the document view from the edited text.
        view.innerHTML = draftDocHtml(edit.value);
        edit.style.display = 'none';
        view.style.display = '';
        if (label) label.textContent = 'This is what you\'ll submit';
        btn.textContent = 'Edit';
      }
    }

    function normaliseFeedbackText(value) {
      return String(value == null ? '' : value).replace(/\r\n?/g, '\n').trim();
    }

    function updateSingleFeedbackAction() {
      var btn = document.getElementById('submitAnotherBtn');
      var edit = document.getElementById('submitDocEdit');
      if (!btn || !edit || mqIsMulti) return;
      var changed = normaliseFeedbackText(edit.value) !== normaliseFeedbackText(feedbackBaseDraftText);
      btn.style.display = changed ? '' : 'none';
      btn.disabled = !changed;
    }

    // Autosave the inline editor to draft_autosaves (restore-on-reopen source).
    function fbScheduleAutosave() {
      if (fbAutosaveTimer) clearTimeout(fbAutosaveTimer);
      fbAutosaveTimer = setTimeout(fbPushAutosave, 1500);
    }
    function setFbSaveIndicator(state) {
      var el = document.getElementById('fbSaveIndicator');
      if (!el) return;
      el.className = 'fb-save-indicator ' + state;
      el.textContent = state === 'saving' ? 'Saving…' : state === 'saved' ? 'Saved' : state === 'failed' ? 'Save failed — your work is still in this tab' : '';
    }
    async function fbPushAutosave() {
      var tId = (currentTask && (currentTask.id || currentTask.task_id)) || (currentMeta && currentMeta.task_id);
      if (!tId) return;
      var body, sig;
      if (mqIsMulti) {
        var ans = readMqAnswers();
        sig = 'A:' + JSON.stringify(answersKeyMap(ans));
        // draft-autosave requires a string snapshot alongside structured
        // answers. Keep the structured array as truth; this flattened form
        // preserves compatibility and enforces the endpoint's size bound.
        var flatDraft = ans.map(function(a) {
          return (typeof a.text === 'string' ? a.text : (a.selected_option_id || '')).trim();
        }).join('\n\n');
        body = { task_id: tId, draft_text: flatDraft, answers: ans, telemetry: fbTelemetry };
      } else {
        var edit = document.getElementById('submitDocEdit');
        if (!edit) return;
        sig = 'T:' + edit.value;
        body = { task_id: tId, draft_text: edit.value, telemetry: fbTelemetry };
      }
      if (sig === fbLastSavedText) return;
      setFbSaveIndicator('saving');
      try {
        var res = await authFetch('/api/draft-autosave', { method: 'PUT', body: JSON.stringify(body) });
        if (!res.ok) throw new Error('save failed');
        fbLastSavedText = sig;
        setFbSaveIndicator('saved');
      } catch (_) {
        setFbSaveIndicator('failed');
      }
    }

    // Read the current multi-question answers from the inline editors (falling
    // back to the stored answers when the editors aren't present).
    function readMqAnswers() {
      var qs = (currentTask && currentTask.questions) || [];
      if (!qs.length || !document.querySelector('.mq-edit-input')) {
        return Array.isArray(currentSubmitAnswers) ? currentSubmitAnswers : [];
      }
      return qs.map(function(q) {
        if (q.type === 'multiple_choice') {
          var checked = document.querySelector('.mq-edit-radio[name="mqq_' + q.id + '"]:checked');
          return { question_id: q.id, selected_option_id: checked ? checked.value : '' };
        }
        var ed = document.getElementById('mqEdit_' + q.id);
        return { question_id: q.id, text: ed ? ed.value : '' };
      });
    }

    function canonicalMqAnswers(value) {
      var byId = {};
      (Array.isArray(value) ? value : []).forEach(function(a) {
        if (!a || !a.question_id) return;
        byId[a.question_id] = Object.prototype.hasOwnProperty.call(a, 'selected_option_id')
          ? { selected_option_id: a.selected_option_id || '' }
          : { text: normaliseFeedbackText(a.text) };
      });
      return ((currentTask && currentTask.questions) || []).map(function(q) {
        return { question_id: q.id, answer: byId[q.id] || (q.type === 'multiple_choice' ? { selected_option_id: '' } : { text: '' }) };
      });
    }

    function updateMqFeedbackAction() {
      var btn = document.getElementById('submitAnotherBtn');
      if (!btn || !mqIsMulti) return;
      var editBtn = document.getElementById('editAnswersBtn');
      var changed = JSON.stringify(canonicalMqAnswers(readMqAnswers())) !== JSON.stringify(canonicalMqAnswers(mqFeedbackBaseAnswers));
      // Read-only, unchanged state has one clear revision action: Edit answers.
      // Once the editor opens, that action gives way to the feedback action,
      // which becomes enabled only after a real content change.
      btn.style.display = (mqEditMode || changed) ? '' : 'none';
      btn.disabled = !changed;
      btn.textContent = changed ? 'Get feedback' : 'Make a change to get feedback';
      if (editBtn) editBtn.style.display = mqEditMode ? 'none' : '';
    }

    // Toggle multi-question answers between read-only and editable.
    function toggleEditAnswers() {
      var btn = document.getElementById('editAnswersBtn');
      var edits = document.querySelectorAll('.mq-edit-input');
      var views = document.querySelectorAll('[id^="mqView_"]');
      mqEditMode = !mqEditMode;
      for (var i = 0; i < views.length; i++) views[i].style.display = mqEditMode ? 'none' : '';
      for (var j = 0; j < edits.length; j++) edits[j].style.display = mqEditMode ? '' : 'none';
      if (btn) btn.textContent = mqEditMode ? 'Done editing' : 'Edit answers';
      if (mqEditMode) {
        if (fbEditorShownAt == null) fbEditorShownAt = Date.now();
        wireMqEditors();
        var firstTa = document.querySelector('.mq-edit-text');
        if (firstTa) firstTa.focus();
      } else {
        syncMqViews();
        if (fbAutosaveTimer) clearTimeout(fbAutosaveTimer);
        fbPushAutosave();
      }
      updateMqFeedbackAction();
    }

    // Wire telemetry + paste blocking + autosave onto the answer editors (once).
    function wireMqEditors() {
      var typedOnly = !currentTask || currentTask.typed_response_only !== false;
      document.querySelectorAll('.mq-edit-text').forEach(function(ta) {
        if (ta.dataset.wired) return;
        ta.dataset.wired = '1';
        ta.addEventListener('input', function() {
          var now = Date.now();
          if (fbTelemetry.time_to_first_keystroke_ms == null) {
            fbTelemetry.time_to_first_keystroke_ms = now - (fbEditorShownAt || now);
            fbTelemetry.typing_session_count = Math.max(1, fbTelemetry.typing_session_count);
          }
          fbTelemetry.keystroke_count += 1;
          if (fbLastInputAt) fbTelemetry.total_typing_time_ms += Math.min(now - fbLastInputAt, 5000);
          fbLastInputAt = now;
          pendingAnswers = readMqAnswers();
          fbScheduleAutosave();
          updateMqFeedbackAction();
        });
        ta.addEventListener('paste', function(ev) {
          fbTelemetry.paste_attempts_blocked += 1;
          if (typedOnly) { ev.preventDefault(); showToast('Pasting is disabled for this task — please type your changes.'); }
        });
        ta.addEventListener('drop', function(ev) {
          fbTelemetry.paste_attempts_blocked += 1;
          if (typedOnly) { ev.preventDefault(); showToast('Dragging text in is disabled for this task.'); }
        });
        ta.addEventListener('dragover', function(ev) { if (typedOnly) ev.preventDefault(); });
      });
      document.querySelectorAll('.mq-edit-radio').forEach(function(r) {
        if (r.dataset.wired) return;
        r.dataset.wired = '1';
        r.addEventListener('change', function() {
          if (fbTelemetry.time_to_first_keystroke_ms == null) {
            fbTelemetry.time_to_first_keystroke_ms = Date.now() - (fbEditorShownAt || Date.now());
            fbTelemetry.typing_session_count = Math.max(1, fbTelemetry.typing_session_count);
          }
          pendingAnswers = readMqAnswers();
          fbScheduleAutosave();
          updateMqFeedbackAction();
        });
      });
    }

    // Regenerate the read-only answer views from the edited answers (on "Done").
    function syncMqViews() {
      var qs = (currentTask && currentTask.questions) || [];
      qs.forEach(function(q) {
        var view = document.getElementById('mqView_' + q.id);
        if (!view) return;
        if (q.type === 'multiple_choice') {
          var checked = document.querySelector('.mq-edit-radio[name="mqq_' + q.id + '"]:checked');
          var opt = checked ? (q.options || []).find(function(o) { return o.id === checked.value; }) : null;
          view.innerHTML = '<div class="mq-mc-result"><div class="mq-mc-line">Your answer: <strong>' + (opt ? e(opt.text) : 'Not answered') + '</strong></div></div>';
        } else {
          var ed = document.getElementById('mqEdit_' + q.id);
          var t = ed ? ed.value : '';
          view.innerHTML = t ? '<div class="mq-answer">' + e(t) + '</div>' : '<div class="mq-answer mq-empty">No answer submitted for this question.</div>';
        }
      });
    }

    // Attachments to carry forward from the latest submission (feedback page has
    // no uploader, so re-feeding/marking preserves the prior draft's files).
    function fbCurrentAttachments() {
      return (allDrafts && allDrafts.length && Array.isArray(allDrafts[allDrafts.length - 1].student_attachments))
        ? allDrafts[allDrafts.length - 1].student_attachments : [];
    }

    // "Submit another draft" — generate feedback on the (edited) working draft or
    // answers in place, then reload the feedback screen with the new feedback.
    // Counts toward the 3-draft cap. No bounce back to submit.html.
    var _fbGenMsgTimer = null;
    async function submitNewDraft(taskId) {
      if (!taskId || fbGenInFlight) return;
      var isMulti = mqIsMulti;
      var endpoint, body;
      if (isMulti) {
        var answers = readMqAnswers();
        var answered = answers.filter(function(a) { return a && ((typeof a.text === 'string' && a.text.trim()) || a.selected_option_id); });
        if (answered.length === 0) { alert('Answer at least one question before getting feedback.'); return; }
        endpoint = '/api/generate-multi-feedback';
        body = { task_id: taskId, answers: answers };
      } else {
        var edit = document.getElementById('submitDocEdit');
        var draft = ((edit ? edit.value : currentDraftText) || '').trim();
        if (draft.length < 50) { alert('Your draft is too short for feedback — write at least a paragraph.'); return; }
        endpoint = '/api/generate-feedback';
        body = { task_id: taskId, draft: draft };
      }
      body.keystroke_count = fbTelemetry.keystroke_count;
      body.paste_attempts_blocked = fbTelemetry.paste_attempts_blocked;
      body.typing_session_count = fbTelemetry.typing_session_count;
      body.total_typing_time_ms = fbTelemetry.total_typing_time_ms;
      body.time_to_first_keystroke_ms = fbTelemetry.time_to_first_keystroke_ms;
      body.student_attachments = fbCurrentAttachments();
      // Flush any pending autosave first (best-effort).
      if (fbAutosaveTimer) { clearTimeout(fbAutosaveTimer); }
      fbGenInFlight = true;
      var overlay = document.createElement('div');
      overlay.className = 'fb-gen-overlay';
      var lead = isMulti ? 'Reading your answers…' : 'Reading your draft…';
      overlay.innerHTML = '<div class="fb-gen-spinner"></div><div class="fb-gen-text" id="fbGenText">' + lead + '</div><div class="fb-gen-hint">Full feedback can take up to a couple of minutes. Please don\'t refresh.</div>';
      document.body.appendChild(overlay);
      var msgs = isMulti
        ? ['Reading your answers…', 'Checking each question against the criteria…', 'Looking at the depth of each response…', 'Finding your strengths…', 'Drafting per-question feedback…', 'Almost there — finalising your feedback…']
        : ['Reading your draft…', 'Checking against the marking criteria…', 'Looking at the depth of your analysis…', 'Comparing with your previous draft…', 'Finding your strengths…', 'Writing your top-priority focus…', 'Assembling inline annotations…', 'Almost there — finalising your feedback…'];
      var mi = 0;
      _fbGenMsgTimer = setInterval(function() { mi = (mi + 1) % msgs.length; var t = document.getElementById('fbGenText'); if (t) t.textContent = msgs[mi]; }, 5000);
      try {
        var res = await authFetch(endpoint, {
          method: 'POST',
          body: JSON.stringify(body),
        });
        var text = await res.text();
        var data; try { data = text ? JSON.parse(text) : {}; } catch (_) { data = {}; }
        if (!res.ok) {
          var msg = data.error || ((res.status === 504 || res.status === 502 || res.status === 524)
            ? 'Feedback is taking longer than usual — please try again, your draft was not lost.'
            : (res.status === 429 ? 'Too many requests right now. Please wait a minute and try again.'
            : 'Could not generate feedback. Please try again in a minute.'));
          throw new Error(msg);
        }
        // Hand off to the normal feedback load path (reload with new feedback).
        sessionStorage.setItem('proofready_feedback', JSON.stringify(data));
        sessionStorage.setItem('proofready_task', JSON.stringify({
          task_id: (currentTask && currentTask.id) || taskId,
          title: currentTask && currentTask.title,
          question: currentTask && currentTask.question,
          questions: (currentTask && currentTask.questions) || null,
          course: currentTask && currentTask.course,
          total_marks: (currentTask && currentTask.total_marks) || null,
          due_date: (currentTask && currentTask.due_date) || null,
          criteria_text: (currentTask && currentTask.hide_criteria_from_students) ? null : ((currentTask && currentTask.criteria_text) || null),
          criteria_structured: (currentTask && currentTask.hide_criteria_from_students) ? null : ((currentTask && currentTask.criteria_structured) || null),
          hide_criteria_from_students: !!(currentTask && currentTask.hide_criteria_from_students),
          teacher_name: (currentTask && currentTask.class) ? currentTask.class.teacher_name : (currentTask && currentTask.teacher_name) || null,
          class_name: (currentTask && currentTask.class) ? currentTask.class.name : (currentTask && currentTask.class_name) || null,
        }));
        if (_fbGenMsgTimer) clearInterval(_fbGenMsgTimer);
        window.location.href = 'feedback.html';
      } catch (err) {
        if (_fbGenMsgTimer) clearInterval(_fbGenMsgTimer);
        overlay.remove();
        fbGenInFlight = false;
        alert(err && err.message ? err.message : 'Could not generate feedback. Please try again.');
      }
    }

    function toggleDetail(id, btn) {
      const el = document.getElementById(id);
      const arrow = btn.querySelector('.detail-toggle-arrow');
      const isHidden = el.style.display === 'none' || getComputedStyle(el).display === 'none';
      if (isHidden) {
        el.style.display = 'block';
        arrow.style.transform = 'rotate(90deg)';
        btn.lastChild.textContent = ' Hide detail';
      } else {
        el.style.display = 'none';
        arrow.style.transform = '';
        btn.lastChild.textContent = ' Show detail';
      }
    }
  </script>
