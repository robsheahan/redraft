<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback — Redraft</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #fafafa;
      color: #111827;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .nav {
      background: #fff;
      border-bottom: 1px solid #f0f0f0;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand {
      font-size: 22px;
      font-weight: 800;
      text-decoration: none;
      color: #111827;
      letter-spacing: -0.5px;
    }
    .nav-brand .re { color: #2563eb; }
    .back-link {
      font-size: 14px;
      font-weight: 500;
      color: #6b7280;
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-link:hover { color: #111827; }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    /* Header */
    .header {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }
    .task-meta {
      font-size: 13px;
      color: #6b7280;
    }
    .task-question {
      margin-top: 16px;
      padding: 14px 16px;
      background: #f9fafb;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.6;
    }
    .task-verb {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 12px;
      background: #f0f6ff;
      color: #2563eb;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    /* Feedback sections */
    .section {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.1px;
    }
    .section-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .section-text {
      font-size: 14px;
      line-height: 1.8;
      color: #374151;
    }

    /* Color variants */
    .done-well .section-dot { background: #22c55e; }
    .done-well .section-title { color: #15803d; }
    .verb-check .section-dot { background: #8b5cf6; }
    .verb-check .section-title { color: #6d28d9; }
    .top-priority { background: #fefce8; border-color: #fef08a; }
    .top-priority .section-dot { background: #eab308; }
    .top-priority .section-title { color: #a16207; }
    .improvements .section-dot { background: #f59e0b; }
    .improvements .section-title { color: #b45309; }
    .overall .section-dot { background: #3b82f6; }
    .overall .section-title { color: #1d4ed8; }
    .strong-response .section-dot { background: #8b5cf6; }
    .strong-response .section-title { color: #6d28d9; }

    /* Lists */
    .feedback-list {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .feedback-list li {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
    }
    .done-well .feedback-list li { background: #f0fdf4; color: #166534; }
    .improvements .feedback-list li {
      background: #fffbeb;
      color: #78350f;
      position: relative;
      padding-left: 40px;
    }
    .improvement-number {
      position: absolute;
      left: 12px;
      top: 12px;
      width: 20px;
      height: 20px;
      background: #fbbf24;
      color: #78350f;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .strong-response .feedback-list li { background: #f5f3ff; color: #4c1d95; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
    }
    .empty-state h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .empty-state p {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 24px;
    }
    .empty-state a {
      display: inline-block;
      padding: 10px 24px;
      background: #111827;
      color: #fff;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }

    .footer {
      text-align: center;
      padding: 32px 20px;
      font-size: 13px;
      color: #9ca3af;
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-brand"><span class="re">re</span>draft</a>
    <a href="student.html" class="back-link">Submit another draft</a>
  </nav>

  <div class="container" id="content"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/app.js"></script>
  <script>
    const feedbackData = sessionStorage.getItem('redraft_feedback');
    const taskData = sessionStorage.getItem('redraft_task');
    const container = document.getElementById('content');

    if (!feedbackData) {
      container.innerHTML = `
        <div class="empty-state">
          <h2>No feedback to show</h2>
          <p>Submit a draft first to see your feedback here.</p>
          <a href="student.html">Go to student page</a>
        </div>`;
    } else {
      const { feedback, meta } = JSON.parse(feedbackData);
      const task = taskData ? JSON.parse(taskData) : {};
      const e = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };

      let html = '';

      // Header
      html += '<div class="header">';
      html += '<h1>Feedback on your draft</h1>';
      if (meta.course) html += '<div class="task-meta">' + e(meta.course) + '</div>';
      if (meta.question) html += '<div class="task-question">' + e(meta.question) + '</div>';
      if (meta.taskVerb) html += '<span class="task-verb">Task verb: ' + e(meta.taskVerb) + '</span>';
      html += '</div>';

      // What you've done well
      if (feedback.what_youve_done_well && feedback.what_youve_done_well.length) {
        html += '<div class="section done-well"><div class="section-title"><span class="section-dot"></span>What you\'ve done well</div>';
        html += '<ul class="feedback-list">';
        feedback.what_youve_done_well.forEach(p => { html += '<li>' + e(p) + '</li>'; });
        html += '</ul></div>';
      }

      // Task verb check
      if (feedback.task_verb_check) {
        html += '<div class="section verb-check"><div class="section-title"><span class="section-dot"></span>Task verb check — "' + e(meta.taskVerb || '') + '"</div>';
        html += '<p class="section-text">' + e(feedback.task_verb_check) + '</p></div>';
      }

      // Top priority
      if (feedback.top_priority) {
        html += '<div class="section top-priority"><div class="section-title"><span class="section-dot"></span>Top priority — focus on this first</div>';
        html += '<p class="section-text">' + e(feedback.top_priority) + '</p></div>';
      }

      // Improvements
      if (feedback.improvements && feedback.improvements.length) {
        html += '<div class="section improvements"><div class="section-title"><span class="section-dot"></span>Things to improve</div>';
        html += '<ul class="feedback-list">';
        feedback.improvements.forEach((p, i) => {
          html += '<li><span class="improvement-number">' + (i + 1) + '</span>' + e(p) + '</li>';
        });
        html += '</ul></div>';
      }

      // Overall
      if (feedback.overall) {
        html += '<div class="section overall"><div class="section-title"><span class="section-dot"></span>Overall</div>';
        html += '<p class="section-text">' + e(feedback.overall) + '</p></div>';
      }

      // What a strong response includes
      if (feedback.what_a_strong_response_includes && feedback.what_a_strong_response_includes.length) {
        html += '<div class="section strong-response"><div class="section-title"><span class="section-dot"></span>What a strong response includes</div>';
        html += '<ul class="feedback-list">';
        feedback.what_a_strong_response_includes.forEach(p => { html += '<li>' + e(p) + '</li>'; });
        html += '</ul></div>';
      }

      html += '<div class="footer">This is formative feedback on a draft — not a final mark.</div>';

      container.innerHTML = html;
    }
  </script>

</body>
</html>
