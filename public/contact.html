<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/proofready/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/proofready/favicon.svg" />
  <link rel="shortcut icon" href="/proofready/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/proofready/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Proof Ready" />
  <link rel="manifest" href="/proofready/site.webmanifest" />
  <title>Contact — ProofReady</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #faf7f2; color: #1f2937; line-height: 1.6;
      min-height: 100vh; display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .nav {
      background: #fdf6ee; border-bottom: 1px solid #f0e6d6;
      padding: 14px 32px; display: flex; align-items: center;
    }
    .nav-brand { text-decoration: none; display: flex; align-items: center; }
    .nav-brand img { height: 32px; width: auto; }

    .container {
      max-width: 600px; margin: 0 auto; padding: 60px 24px 80px;
      flex: 1;
    }
    h1 {
      font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
      margin-bottom: 24px;
    }
    p { font-size: 15px; color: #4b5563; margin-bottom: 16px; }
    a { color: #ed7615; }
    a:hover { color: #d4690f; }

    .footer {
      text-align: center; padding: 24px; font-size: 13px; color: #9ca3af;
      border-top: 1px solid #e8e0d4;
    }
    .footer a { color: #9ca3af; text-decoration: none; margin: 0 10px; }
    .footer a:hover { color: #6b7280; }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-brand"><img src="/proofready-banner.svg" alt="ProofReady"></a>
  </nav>

  <div class="container">
    <h1>Contact us</h1>
    <p>For questions, feedback, or support enquiries, please reach out via email.</p>
    <p><a href="mailto:help@proofready.app">help@proofready.app</a></p>
    <p>We aim to respond within two business days.</p>
  </div>

  <div class="footer">
    <a href="/contact.html">Contact</a>
    <a href="/privacy.html">Privacy Policy</a>
    <a href="/terms.html">Terms &amp; Conditions</a>
  </div>

</body>
</html>
