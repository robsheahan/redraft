<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose your role — ProofReady</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #fafafa; color: #111827; line-height: 1.5;
      min-height: 100vh; display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .nav { padding: 24px 32px; }
    .nav-brand {
      text-decoration: none; display: flex; align-items: center;
    }
    .nav-brand img { height: 32px; width: auto; }

    .page {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px 80px; text-align: center;
    }
    .page h1 {
      font-size: 28px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 8px;
    }
    .page p {
      font-size: 15px; color: #6b7280; margin-bottom: 40px;
    }
    .cards { display: flex; gap: 16px; max-width: 500px; width: 100%; }
    @media (max-width: 520px) { .cards { flex-direction: column; } }
    .card {
      flex: 1; background: #fff; border: 1px solid #e5e7eb;
      border-radius: 12px; padding: 32px 24px; text-align: center;
      cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      border-color: #2563eb; box-shadow: 0 4px 16px rgba(37,99,235,0.08);
    }
    .card-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .card-icon svg { width: 28px; height: 28px; stroke: #2563eb; stroke-width: 1.5; fill: none; }
    .card h2 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .card p { font-size: 13px; color: #6b7280; margin-bottom: 0; }
    .card.selecting { opacity: 0.6; pointer-events: none; }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-brand"><img src="/proofready-banner.svg" alt="ProofReady"></a>
  </nav>

  <div class="page">
    <h1 id="heading">How will you use ProofReady?</h1>
    <p>This is saved to your account — you won't be asked again.</p>
    <div class="cards">
      <div class="card" onclick="pickRole('teacher')">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
        </div>
        <h2>I'm a teacher</h2>
        <p>Create tasks and review student feedback</p>
      </div>
      <div class="card" onclick="pickRole('student')">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </div>
        <h2>I'm a student</h2>
        <p>Submit drafts and get feedback</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/app.js"></script>
  <script>
    // Must be logged in to see this page
    getCurrentUser().then(user => {
      if (!user) { window.location.href = '/auth.html'; return; }
      // If already has role, go to dashboard
      const role = user.user_metadata?.role;
      if (role) {
        window.location.href = role === 'teacher' ? '/teacher.html' : '/student.html';
      } else {
        const name = user.user_metadata?.display_name || '';
        if (name) document.getElementById('heading').textContent = 'Hey ' + name + ', how will you use ProofReady?';
      }
    });

    async function pickRole(role) {
      document.querySelectorAll('.card').forEach(c => c.classList.add('selecting'));

      try {
        const res = await authFetch('/api/set-role', {
          method: 'POST',
          body: JSON.stringify({ role }),
        });
        if (!res.ok) { const d = await res.json(); throw new Error(d.error); }

        // Refresh the session so metadata is updated
        await sb.auth.refreshSession();

        window.location.href = role === 'teacher' ? '/teacher.html' : '/student.html';
      } catch (err) {
        alert(err.message);
        document.querySelectorAll('.card').forEach(c => c.classList.remove('selecting'));
      }
    }
  </script>

</body>
</html>
